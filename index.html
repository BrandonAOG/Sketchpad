<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Always On Generators – Drawing Pad</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cyan: #D97706;
  --cyan-dim: #B45309;
  --amber: #D97706;
  --green: #059669;
  --red: #DC2626;
  --bg: #FFFFFF;
  --bg2: #F8F8F8;
  --bg3: #F0F0F0;
  --panel: #FFFFFF;
  --border: rgba(217,119,6,0.25);
  --border-bright: rgba(217,119,6,0.5);
  --text: #1F2937;
  --text-muted: #6B7280;
  --text-dim: #9CA3AF;
  --glow: 0 0 8px rgba(217,119,6,0.3), 0 0 20px rgba(217,119,6,0.1);
  --canvas-bg: #ffffff;
  --grid-color: rgba(217,119,6,0.12);
  --font-display: 'Orbitron', monospace;
  --font-mono: 'Share Tech Mono', monospace;
  --font-body: 'Exo 2', sans-serif;
  --toolbar-bg: #ffffff;
  --tool-active: rgba(217,119,6,0.18);
  --tool-border: rgba(217,119,6,0.4);
}

body.dark-mode {
  --bg: #0A0E27;
  --bg2: #0F1535;
  --bg3: #1A2847;
  --panel: #0F1535;
  --border: rgba(0,255,200,0.08);
  --border-bright: rgba(0,255,200,0.25);
  --text: #E0F7FF;
  --text-muted: #7DD3FC;
  --text-dim: #38BDF8;
  --glow: 0 0 8px rgba(0,255,200,0.3), 0 0 16px rgba(0,255,200,0.15);
  --cyan: #00FFC8;
  --cyan-dim: #06B6D4;
  --green: #10B981;
  --red: #F43F5E;
  --canvas-bg: #0d1b2a;
  --grid-color: rgba(0,255,200,0.07);
  --toolbar-bg: #0F1535;
  --tool-active: rgba(0,255,200,0.15);
  --tool-border: rgba(0,255,200,0.3);
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}

body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  transition:background 0.3s,color 0.3s;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
}

body.dark-mode{
  background:linear-gradient(135deg,#0A0E27 0%,#0F1535 25%,#0A1628 50%,#0F1535 75%,#0A0E27 100%);
}

/* ── HEADER ── */
.header{
  flex-shrink:0;
  background:var(--toolbar-bg);
  padding:6px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:2px solid var(--cyan);
  gap:8px;
  min-height:50px;
  position:relative;
  overflow:hidden;
  transition:background 0.3s,border-color 0.3s;
  flex-wrap: wrap;
}

body.dark-mode .header{
  background:linear-gradient(90deg,rgba(15,21,53,0.95) 0%,rgba(26,40,71,0.85) 50%,rgba(15,21,53,0.95) 100%);
  border-bottom-color:#00FFC8;
  box-shadow:0 2px 12px rgba(0,255,200,0.1);
}

.header::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  opacity:0.5;
}

.header-logo{display:flex;align-items:center;gap:8px;}

.logo-img{
  width:40px;height:40px;
  object-fit:contain;
  filter:drop-shadow(0 0 6px rgba(217,119,6,0.4));
  flex-shrink:0;
}

.company-name{
  font-family:var(--font-display);
  font-size:0.75rem;
  color:var(--cyan);
  letter-spacing:1.5px;
  line-height:1.1;
  font-weight:700;
  text-shadow:0 0 10px rgba(217,119,6,0.2);
}

body.dark-mode .company-name{
  color:#00FFC8;
  text-shadow:0 0 10px #00FFC8,0 0 20px rgba(0,255,200,0.4);
}

.header-title{
  font-family:var(--font-display);
  font-size:0.65rem;
  color:var(--text-muted);
  letter-spacing:2px;
  text-transform:uppercase;
  flex: 1;
}

body.dark-mode .header-title{color:#7DD3FC;}

.header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}

/* ── THEME BUTTON ── */
.theme-btn{
  width:32px;height:32px;
  border:1px solid var(--tool-border);
  background:rgba(217,119,6,0.05);
  border-radius:4px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--cyan);
  transition:all 0.2s;
  flex-shrink:0;
  position:relative;
  touch-action: manipulation;
}
body.dark-mode .theme-btn{background:rgba(0,255,200,0.07);color:#00FFC8;}
.theme-btn:hover{border-color:var(--cyan);box-shadow:var(--glow);transform:scale(1.08);}
.theme-btn:active{transform:scale(0.95);}
.theme-btn svg{position:absolute;transition:all 0.3s;stroke:var(--cyan);}
body.dark-mode .theme-btn svg{stroke:#00FFC8;}
.icon-sun{opacity:1;}
.icon-moon{opacity:0;}
body.dark-mode .icon-sun{opacity:0;transform:rotate(180deg);}
body.dark-mode .icon-moon{opacity:1;transform:rotate(0deg);}

/* ── ACTION BUTTONS ── */
.action-btn{
  display:inline-flex;align-items:center;gap:3px;
  padding:5px 10px;
  border:1px solid var(--tool-border);
  background:rgba(217,119,6,0.05);
  font-family:var(--font-display);
  font-size:0.5rem;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  color:var(--cyan);
  white-space:nowrap;
  min-height:28px;
  transition:all 0.15s;
  clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
  touch-action: manipulation;
}
body.dark-mode .action-btn{background:rgba(0,255,200,0.07);border-color:rgba(0,255,200,0.25);color:#00FFC8;}
.action-btn:hover{border-color:var(--cyan);box-shadow:var(--glow);}
.action-btn:active{transform:scale(0.95);}
.action-btn.danger{border-color:rgba(220,38,38,0.4);color:#DC2626;}
body.dark-mode .action-btn.danger{border-color:rgba(244,63,94,0.4);color:#F43F5E;}
.action-btn.danger:hover{box-shadow:0 0 8px rgba(220,38,38,0.3);}

/* ── TOOLBAR ── */
.toolbar{
  flex-shrink:0;
  background:var(--toolbar-bg);
  border-bottom:1px solid var(--border-bright);
  display:flex;
  align-items:center;
  gap:2px;
  padding:4px 6px;
  flex-wrap:wrap;
  transition:background 0.3s, max-height 0.3s ease, opacity 0.3s ease;
  position:relative;
  z-index:10;
  max-height: 120px;
  overflow-y: auto;
  opacity: 1;
}

.toolbar.toolbar-hidden {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  padding: 0 6px;
  border-bottom: none;
}

body.dark-mode .toolbar{
  background:linear-gradient(90deg,rgba(15,21,53,0.9) 0%,rgba(26,40,71,0.75) 100%);
  border-bottom-color:rgba(0,255,200,0.15);
}

.tool-sep{
  width:1px;height:24px;
  background:var(--border-bright);
  margin:0 3px;
  flex-shrink:0;
}

body.dark-mode .tool-sep{background:rgba(0,255,200,0.2);}

.tool-btn{
  display:flex;align-items:center;justify-content:center;
  width:30px;height:30px;
  border:1px solid transparent;
  background:transparent;
  border-radius:3px;
  cursor:pointer;
  color:var(--text-muted);
  transition:all 0.15s;
  flex-shrink:0;
  position:relative;
  font-size:14px;
  touch-action: manipulation;
}
body.dark-mode .tool-btn{color:#7DD3FC;}
.tool-btn:hover{
  border-color:var(--tool-border);
  background:var(--tool-active);
  color:var(--cyan);
}
.tool-btn:active{transform:scale(0.9);}
.tool-btn.active{
  border-color:var(--cyan);
  background:var(--tool-active);
  color:var(--cyan);
  box-shadow:0 0 6px rgba(217,119,6,0.2);
}
body.dark-mode .tool-btn.active{
  border-color:#00FFC8;
  background:rgba(0,255,200,0.12);
  color:#00FFC8;
  box-shadow:0 0 8px rgba(0,255,200,0.25);
}

.tool-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* tool-btn with text label */
.tool-btn-label{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:auto;min-width:30px;height:30px;
  padding:0 5px;
  border:1px solid transparent;
  background:transparent;
  border-radius:3px;
  cursor:pointer;
  color:var(--text-muted);
  transition:all 0.15s;
  flex-shrink:0;
  font-family:var(--font-display);
  font-size:0.4rem;
  letter-spacing:0.5px;
  text-transform:uppercase;
  gap:1px;
  touch-action: manipulation;
}
body.dark-mode .tool-btn-label{color:#7DD3FC;}
.tool-btn-label:hover,.tool-btn-label.active{
  border-color:var(--cyan);
  background:var(--tool-active);
  color:var(--cyan);
}
body.dark-mode .tool-btn-label:hover,body.dark-mode .tool-btn-label.active{
  border-color:#00FFC8;color:#00FFC8;background:rgba(0,255,200,0.12);
}
.tool-btn-label svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* color swatch */
.color-swatch{
  width:22px;height:22px;
  border-radius:3px;
  border:2px solid var(--border-bright);
  cursor:pointer;
  flex-shrink:0;
  transition:transform 0.15s,box-shadow 0.15s;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  position:relative;
  touch-action: manipulation;
}
.color-swatch:hover{transform:scale(1.15);box-shadow:0 0 6px rgba(0,0,0,0.3);}
.color-swatch:active{transform:scale(0.9);}
.color-swatch.active{border-color:var(--cyan);box-shadow:0 0 8px rgba(217,119,6,0.4);}
body.dark-mode .color-swatch.active{border-color:#00FFC8;box-shadow:0 0 8px rgba(0,255,200,0.4);}

/* stroke size buttons */
.stroke-btn{
  display:flex;align-items:center;justify-content:center;
  width:26px;height:26px;
  border:1px solid transparent;
  background:transparent;
  border-radius:3px;
  cursor:pointer;
  flex-shrink:0;
  transition:all 0.15s;
  touch-action: manipulation;
}
.stroke-btn:hover,.stroke-btn.active{
  border-color:var(--cyan);
  background:var(--tool-active);
}
.stroke-btn:active{transform:scale(0.9);}
body.dark-mode .stroke-btn.active{border-color:#00FFC8;background:rgba(0,255,200,0.12);}

/* inline number input */
.toolbar-input{
  width:40px;
  font-family:var(--font-mono);
  font-size:0.65rem;
  background:var(--bg2);
  border:1px solid var(--border-bright);
  color:var(--text);
  padding:2px 4px;
  border-radius:2px;
  outline:none;
  text-align:center;
  flex-shrink:0;
  touch-action: manipulation;
}
body.dark-mode .toolbar-input{
  background:rgba(10,14,39,0.7);
  border-color:rgba(0,255,200,0.2);
  color:#E0F7FF;
}

/* font size selector */
.toolbar-select{
  font-family:var(--font-mono);
  font-size:0.65rem;
  background:var(--bg2);
  border:1px solid var(--border-bright);
  color:var(--text);
  padding:2px 4px;
  border-radius:2px;
  outline:none;
  cursor:pointer;
  flex-shrink:0;
  touch-action: manipulation;
}
body.dark-mode .toolbar-select{
  background:rgba(10,14,39,0.7);
  border-color:rgba(0,255,200,0.2);
  color:#E0F7FF;
}

/* opacity slider */
.opacity-wrap{
  display:flex;align-items:center;gap:3px;
  flex-shrink:0;
}
.opacity-label{
  font-family:var(--font-display);
  font-size:0.4rem;
  letter-spacing:0.5px;
  color:var(--text-muted);
  text-transform:uppercase;
  white-space:nowrap;
}
body.dark-mode .opacity-label{color:#7DD3FC;}
input[type=range].opacity-slider{
  width:50px;height:4px;
  accent-color:var(--cyan);
  cursor:pointer;
}

/* ── TOOLBAR TOGGLE BUTTON ── */
.toolbar-toggle-btn {
  position: fixed;
  top: 54px;
  right: 10px;
  width: 32px;
  height: 32px;
  border: 1px solid var(--tool-border);
  background: rgba(217,119,6,0.05);
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--cyan);
  transition: all 0.2s;
  flex-shrink: 0;
  z-index: 11;
  touch-action: manipulation;
}

body.dark-mode .toolbar-toggle-btn {
  background: rgba(0,255,200,0.07);
  color: #00FFC8;
  border-color: rgba(0,255,200,0.25);
}

.toolbar-toggle-btn:hover {
  border-color: var(--cyan);
  box-shadow: var(--glow);
  transform: scale(1.08);
}

.toolbar-toggle-btn:active {
  transform: scale(0.95);
}

.toolbar-toggle-btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ── CANVAS AREA ── */
.canvas-wrap{
  flex:1;
  position:relative;
  overflow:auto;
  background:var(--bg3);
  transition:background 0.3s;
  display:flex;
  align-items:center;
  justify-content:center;
  padding: 20px;
}

.paper-container{
  position: relative;
  background: white;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  aspect-ratio: 8.5 / 11;
  width: 100%;
  max-width: 816px;
}

body.dark-mode .paper-container{
  background: #1a1a1a;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

#grid-canvas,#main-canvas,#overlay-canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  display:block;
}

#grid-canvas{z-index:0;pointer-events:none;}
#main-canvas{z-index:1;}
#overlay-canvas{z-index:2;cursor:crosshair;touch-action: none;}

/* TEXT INPUT OVERLAY */
#text-input-overlay{
  position:absolute;
  z-index:20;
  display:none;
  background:transparent;
  border:1.5px dashed var(--cyan);
  outline:none;
  font-family:var(--font-mono);
  color:var(--text);
  padding:2px 4px;
  min-width:80px;
  min-height:24px;
  resize:none;
  overflow:hidden;
  white-space:pre;
  line-height:1.4;
  caret-color:var(--cyan);
}
body.dark-mode #text-input-overlay{
  border-color:#00FFC8;
  color:#E0F7FF;
  caret-color:#00FFC8;
}

/* ── STATUS BAR ── */
.statusbar{
  flex-shrink:0;
  height:20px;
  background:var(--toolbar-bg);
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:12px;
  padding:0 10px;
  font-family:var(--font-mono);
  font-size:0.55rem;
  color:var(--text-muted);
  transition:background 0.3s;
  flex-wrap: wrap;
}
body.dark-mode .statusbar{
  background:rgba(15,21,53,0.9);
  color:#7DD3FC;
  border-top-color:rgba(0,255,200,0.1);
}
.statusbar span{white-space:nowrap;}
.statusbar .dot{
  display:inline-block;
  width:5px;height:5px;
  border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 5px var(--cyan);
  animation:blink 2s infinite;
}
body.dark-mode .statusbar .dot{
  background:#00FFC8;
  box-shadow:0 0 5px #00FFC8;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* ── ELECTRICAL SYMBOL PANEL ── */
.sym-panel{
  position:absolute;
  right:0;top:0;bottom:0;
  width:180px;
  background:var(--toolbar-bg);
  border-left:1px solid var(--border-bright);
  z-index:5;
  display:flex;
  flex-direction:column;
  transition:transform 0.25s ease,background 0.3s;
  transform:translateX(100%);
  overflow:hidden;
}
body.dark-mode .sym-panel{
  background:rgba(15,21,53,0.97);
  border-left-color:rgba(0,255,200,0.2);
}
.sym-panel.open{transform:translateX(0);}

.sym-panel-header{
  padding:8px 10px;
  border-bottom:1px solid var(--border-bright);
  font-family:var(--font-display);
  font-size:0.55rem;
  letter-spacing:1.5px;
  color:var(--cyan);
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
body.dark-mode .sym-panel-header{color:#00FFC8;border-bottom-color:rgba(0,255,200,0.2);}

.sym-close{
  background:none;border:none;cursor:pointer;
  color:var(--text-muted);font-size:16px;line-height:1;
  transition:color 0.15s;
  touch-action: manipulation;
}
.sym-close:hover{color:var(--red);}

.sym-search{
  padding:6px 8px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sym-search input{
  width:100%;
  font-family:var(--font-mono);
  font-size:0.65rem;
  background:var(--bg2);
  border:1px solid var(--border-bright);
  color:var(--text);
  padding:4px 6px;
  outline:none;
  border-radius:2px;
  touch-action: manipulation;
}
body.dark-mode .sym-search input{
  background:rgba(10,14,39,0.7);
  border-color:rgba(0,255,200,0.2);
  color:#E0F7FF;
}

.sym-scroll{
  overflow-y:auto;
  flex:1;
  padding:6px;
}
.sym-category{
  font-family:var(--font-display);
  font-size:0.48rem;
  letter-spacing:1.5px;
  color:var(--text-muted);
  text-transform:uppercase;
  margin:8px 0 4px;
  padding-bottom:2px;
  border-bottom:1px solid var(--border);
}
body.dark-mode .sym-category{color:#7DD3FC;border-bottom-color:rgba(0,255,200,0.1);}

.sym-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px;
  margin-bottom:6px;
}

.sym-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  padding:5px 3px;
  border:1px solid var(--border);
  background:var(--bg2);
  cursor:pointer;
  border-radius:3px;
  transition:all 0.15s;
  font-family:var(--font-display);
  font-size:0.38rem;
  letter-spacing:0.3px;
  color:var(--text-muted);
  text-align:center;
  -webkit-tap-highlight-color:transparent;
  touch-action: manipulation;
}
body.dark-mode .sym-btn{
  background:rgba(26,40,71,0.5);
  border-color:rgba(0,255,200,0.1);
  color:#7DD3FC;
}
.sym-btn:hover{
  border-color:var(--cyan);
  background:var(--tool-active);
  color:var(--cyan);
}
body.dark-mode .sym-btn:hover{border-color:#00FFC8;color:#00FFC8;}
.sym-btn:active{transform:scale(0.95);}

.sym-btn canvas{
  display:block;
  border-radius:1px;
}

/* ── CONTEXT MENU ── */
#ctx-menu{
  position:absolute;
  z-index:50;
  background:var(--panel);
  border:1px solid var(--border-bright);
  box-shadow:0 4px 20px rgba(0,0,0,0.25);
  display:none;
  min-width:140px;
  padding:4px 0;
}
body.dark-mode #ctx-menu{
  background:rgba(10,14,39,0.97);
  border-color:rgba(0,255,200,0.25);
  box-shadow:0 4px 20px rgba(0,0,0,0.6);
}
.ctx-item{
  display:block;
  width:100%;
  padding:7px 12px;
  background:none;
  border:none;
  text-align:left;
  font-family:var(--font-display);
  font-size:0.55rem;
  letter-spacing:0.8px;
  color:var(--text);
  cursor:pointer;
  text-transform:uppercase;
  transition:background 0.1s;
  touch-action: manipulation;
}
body.dark-mode .ctx-item{color:#E0F7FF;}
.ctx-item:hover{background:var(--tool-active);color:var(--cyan);}
body.dark-mode .ctx-item:hover{color:#00FFC8;}
.ctx-sep{height:1px;background:var(--border);margin:3px 0;}
body.dark-mode .ctx-sep{background:rgba(0,255,200,0.1);}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:rgba(217,119,6,0.3);}
body.dark-mode ::-webkit-scrollbar-thumb{background:rgba(0,255,200,0.25);}

/* ── MOBILE ── */
@media(max-width:768px){
  .company-name{font-size:0.65rem;letter-spacing:0.5px;}
  .header-title{display:none;}
  .logo-img{width:32px;height:32px;}
  .action-btn{padding:4px 7px;font-size:0.45rem;}
  .sym-panel{width:150px;}
  .tool-btn{width:28px;height:28px;}
  .toolbar-input{width:36px;}
}

@media(max-width:480px){
  .company-name{font-size:0.6rem;}
  .action-btn{padding:3px 6px;font-size:0.4rem;}
  .sym-panel{width:140px;}
  .tool-btn{width:26px;height:26px;}
  .tool-btn svg{width:14px;height:14px;}
}

/* ── PRINT ── */
@media print{
  .header,.toolbar,.statusbar,.sym-panel,#ctx-menu,.toolbar-toggle-btn{display:none!important;}
  .canvas-wrap{position:static!important;width:100%!important;height:auto!important;background:white;padding:0;}
  .paper-container{position:static;box-shadow:none;max-width:100%;}
  #overlay-canvas,#grid-canvas{display:none!important;}
  #main-canvas{position:static!important;width:100%!important;height:auto!important;}
}

<script>
/* =====================================================
   ALWAYS ON GENERATORS — DRAWING PAD v2
   iPad/Tablet Friendly with 8.5x11 Paper
   ===================================================== */

// ── STATE ──────────────────────────────────────────────
const THEME_KEY = 'aog_drawpad_theme';
const TOOLBAR_VISIBLE_KEY = 'aog_drawpad_toolbar_visible';
const PAPER_WIDTH = 816; // 8.5 inches at 96dpi
const PAPER_HEIGHT = 1056; // 11 inches at 96dpi

let darkMode = false;
let toolbarVisible = true;
let currentTool = 'select';
let strokeColor = '#1F2937';
let fillColor = 'transparent';
let strokeWidth = 2;
let lineDash = 'solid';
let fontSize = 14;
let globalOpacity = 1.0;
let showGrid = true;
let snapToGrid = false;
let gridSize = 20;

let zoom = 1.0;
let panX = 0, panY = 0;
let isPanning = false;
let panStart = {x:0,y:0};

let objects = [];
let undoStack = [];
let redoStack = [];

let isDrawing = false;
let drawStart = {x:0,y:0};
let drawCurrent = {x:0,y:0};
let polyPoints = [];
let selectedObj = null;
let selectedObjects = [];
let dragObj = null;
let dragOffset = {x:0,y:0};
let activeTextEl = null;
let activeTextObj = null;
let colorPickerTarget = 'stroke';
let resizingObj = null;
let resizeCorner = null;

let clipboard = null;

// ── CANVAS REFS ─────────────────────────────────────────
const wrap       = document.getElementById('canvas-wrap');
const paper      = document.getElementById('paper-container');
const gridCvs    = document.getElementById('grid-canvas');
const mainCvs    = document.getElementById('main-canvas');
const overlayCvs = document.getElementById('overlay-canvas');
const gridCtx    = gridCvs.getContext('2d');
const mainCtx    = mainCvs.getContext('2d');
const overlayCtx = overlayCvs.getContext('2d');
const textTA     = document.getElementById('text-input-overlay');
const toolbar    = document.getElementById('toolbar');
const toolbarToggleBtn = document.getElementById('toolbar-toggle');

// ── INIT CANVASES ──────────────────────────────────────
function initCanvases() {
  gridCvs.width  = PAPER_WIDTH;
  gridCvs.height = PAPER_HEIGHT;
  mainCvs.width  = PAPER_WIDTH;
  mainCvs.height = PAPER_HEIGHT;
  overlayCvs.width  = PAPER_WIDTH;
  overlayCvs.height = PAPER_HEIGHT;
  
  paper.style.width = PAPER_WIDTH + 'px';
  paper.style.height = PAPER_HEIGHT + 'px';
  
  drawGrid();
  redrawAll();
}

window.addEventListener('resize', () => {
  drawGrid();
  redrawAll();
});

// ── THEME ────────────────────────────────────────────────
function applyTheme(dark) {
  darkMode = dark;
  if (dark) document.body.classList.add('dark-mode');
  else      document.body.classList.remove('dark-mode');
  try { localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light'); } catch(e){}
  drawGrid();
  redrawAll();
}
function toggleTheme() { applyTheme(!darkMode); }
document.getElementById('theme-btn').addEventListener('click', toggleTheme);

// ── TOOLBAR TOGGLE ──────────────────────────────────────
function toggleToolbar() {
  toolbarVisible = !toolbarVisible;
  toolbar.classList.toggle('toolbar-hidden', !toolbarVisible);
  try { localStorage.setItem(TOOLBAR_VISIBLE_KEY, toolbarVisible ? 'true' : 'false'); } catch(e){}
}

toolbarToggleBtn.addEventListener('click', toggleToolbar);

// ── GRID ─────────────────────────────────────────────────
function drawGrid() {
  const w = PAPER_WIDTH;
  const h = PAPER_HEIGHT;
  gridCtx.clearRect(0,0,w,h);
  if (!showGrid) return;

  const color = darkMode ? 'rgba(0,255,200,0.07)' : 'rgba(217,119,6,0.1)';
  const colorMaj = darkMode ? 'rgba(0,255,200,0.14)' : 'rgba(217,119,6,0.2)';
  const gs = gridSize;

  gridCtx.lineWidth = 0.5;

  for (let x = 0; x < w; x += gs) {
    const isMaj = (x / gs) % 5 === 0;
    gridCtx.strokeStyle = isMaj ? colorMaj : color;
    gridCtx.lineWidth = isMaj ? 0.8 : 0.4;
    gridCtx.beginPath();
    gridCtx.moveTo(x, 0);
    gridCtx.lineTo(x, h);
    gridCtx.stroke();
  }

  for (let y = 0; y < h; y += gs) {
    const isMaj = (y / gs) % 5 === 0;
    gridCtx.strokeStyle = isMaj ? colorMaj : color;
    gridCtx.lineWidth = isMaj ? 0.8 : 0.4;
    gridCtx.beginPath();
    gridCtx.moveTo(0, y);
    gridCtx.lineTo(w, y);
    gridCtx.stroke();
  }
}

// ── COORD TRANSFORMS ─────────────────────────────────────
function screenToWorld(sx, sy) {
  const rect = overlayCvs.getBoundingClientRect();
  const relX = sx - rect.left;
  const relY = sy - rect.top;
  return { x: relX / zoom, y: relY / zoom };
}

function worldToScreen(wx, wy) {
  const rect = overlayCvs.getBoundingClientRect();
  const left = rect.left;
  const top = rect.top;
  return { x: wx * zoom + left, y: wy * zoom + top };
}

function snapPt(p) {
  if (!snapToGrid) return p;
  return {
    x: Math.round(p.x / gridSize) * gridSize,
    y: Math.round(p.y / gridSize) * gridSize
  };
}

// ── DRAW HELPERS ─────────────────────────────────────────
function applyStyle(ctx, obj) {
  ctx.globalAlpha = obj.opacity !== undefined ? obj.opacity : 1;
  ctx.strokeStyle = obj.strokeColor || '#1F2937';
  ctx.lineWidth   = obj.strokeWidth || 2;
  ctx.fillStyle   = obj.fillColor || 'transparent';
  ctx.font = `${obj.fontSize||14}px ${obj.fontFamily||"'Share Tech Mono', monospace"}`;

  const dash = obj.lineDash || 'solid';
  if (dash === 'dashed')      ctx.setLineDash([(obj.strokeWidth||2)*4, (obj.strokeWidth||2)*3]);
  else if (dash === 'dotted') ctx.setLineDash([(obj.strokeWidth||2)*1, (obj.strokeWidth||2)*4]);
  else                        ctx.setLineDash([]);
}

function drawArrowHead(ctx, x1,y1, x2,y2, size) {
  const angle = Math.atan2(y2-y1, x2-x1);
  ctx.save();
  ctx.translate(x2,y2);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(-size,-size/2.5);
  ctx.lineTo(-size, size/2.5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawObject(ctx, obj, selecting) {
  ctx.save();
  applyStyle(ctx, obj);

  switch(obj.type) {
    case 'pen': {
      if (!obj.points || obj.points.length < 2) break;
      ctx.beginPath();
      ctx.moveTo(obj.points[0].x, obj.points[0].y);
      for (let i=1;i<obj.points.length;i++) {
        ctx.lineTo(obj.points[i].x, obj.points[i].y);
      }
      ctx.stroke();
      break;
    }
    case 'line': {
      ctx.beginPath();
      ctx.moveTo(obj.x1, obj.y1);
      ctx.lineTo(obj.x2, obj.y2);
      ctx.stroke();
      break;
    }
    case 'arrow': {
      ctx.beginPath();
      ctx.moveTo(obj.x1, obj.y1);
      ctx.lineTo(obj.x2, obj.y2);
      ctx.stroke();
      ctx.fillStyle = obj.strokeColor;
      ctx.globalAlpha = ctx.globalAlpha;
      drawArrowHead(ctx, obj.x1, obj.y1, obj.x2, obj.y2, (obj.strokeWidth||2)*3.5);
      break;
    }
    case 'rect': {
      if (obj.fillColor && obj.fillColor !== 'transparent') {
        ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
      }
      ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
      break;
    }
    case 'circle': {
      ctx.beginPath();
      ctx.ellipse(obj.cx, obj.cy, obj.rx, obj.ry, 0, 0, Math.PI*2);
      if (obj.fillColor && obj.fillColor !== 'transparent') ctx.fill();
      ctx.stroke();
      break;
    }
    case 'poly': {
      if (!obj.points || obj.points.length < 2) break;
      ctx.beginPath();
      ctx.moveTo(obj.points[0].x, obj.points[0].y);
      for (let i=1;i<obj.points.length;i++) {
        ctx.lineTo(obj.points[i].x, obj.points[i].y);
      }
      if (obj.closed) {
        ctx.closePath();
        if (obj.fillColor && obj.fillColor !== 'transparent') ctx.fill();
      }
      ctx.stroke();
      break;
    }
    case 'text': {
      ctx.fillStyle = obj.strokeColor;
      ctx.globalAlpha = obj.opacity !== undefined ? obj.opacity : 1;
      const lines = (obj.text||'').split('\n');
      const lh = (obj.fontSize||14)*1.4;
      lines.forEach((ln,i) => ctx.fillText(ln, obj.x, obj.y + i*lh));
      break;
    }
    case 'measure': {
      ctx.setLineDash([(obj.strokeWidth||2)*4, (obj.strokeWidth||2)*3]);
      ctx.beginPath();
      ctx.moveTo(obj.x1, obj.y1);
      ctx.lineTo(obj.x2, obj.y2);
      ctx.stroke();
      ctx.setLineDash([]);
      // tick marks
      const ang = Math.atan2(obj.y2-obj.y1, obj.x2-obj.x1) + Math.PI/2;
      const tk = 8;
      [[obj.x1,obj.y1],[obj.x2,obj.y2]].forEach(([px,py]) => {
        ctx.beginPath();
        ctx.moveTo(px + Math.cos(ang)*tk, py + Math.sin(ang)*tk);
        ctx.lineTo(px - Math.cos(ang)*tk, py - Math.sin(ang)*tk);
        ctx.stroke();
      });
      // label
      const dist = Math.sqrt((obj.x2-obj.x1)**2+(obj.y2-obj.y1)**2);
      const label = dist.toFixed(1) + (obj.unit||' ft');
      ctx.setLineDash([]);
      ctx.fillStyle = obj.strokeColor;
      ctx.font = `bold 12px 'Share Tech Mono',monospace`;
      const mx = (obj.x1+obj.x2)/2, my = (obj.y1+obj.y2)/2;
      ctx.save();
      ctx.translate(mx,my);
      const textAng = Math.atan2(obj.y2-obj.y1, obj.x2-obj.x1);
      if (textAng > Math.PI/2 || textAng < -Math.PI/2) ctx.rotate(textAng+Math.PI);
      else ctx.rotate(textAng);
      ctx.fillText(label, -ctx.measureText(label).width/2, -6);
      ctx.restore();
      break;
    }
    case 'symbol': {
      if (!obj.imgData) break;
      const img = new Image();
      img.src = obj.imgData;
      ctx.drawImage(img, obj.x, obj.y, obj.w, obj.h);
      break;
    }
  }

  // Selection highlight + resize handles
  if (selecting) {
    ctx.globalAlpha = 0.9;
    ctx.setLineDash([4,3]);
    ctx.strokeStyle = darkMode ? '#00FFC8' : '#D97706';
    ctx.lineWidth = 1.5;
    const bb = getBoundingBox(obj);
    if (bb) {
      ctx.strokeRect(bb.x-5, bb.y-5, bb.w+10, bb.h+10);
      // 8 resize handles
      ctx.fillStyle = darkMode ? '#00FFC8' : '#D97706';
      ctx.setLineDash([]);
      const handles = [
        [bb.x-5, bb.y-5],           // tl
        [bb.x + bb.w/2 - 5, bb.y-5], // t
        [bb.x + bb.w + 5 - 10, bb.y-5], // tr
        [bb.x-5, bb.y + bb.h/2 - 5], // l
        [bb.x + bb.w + 5 - 10, bb.y + bb.h/2 - 5], // r
        [bb.x-5, bb.y + bb.h + 5 - 10], // bl
        [bb.x + bb.w/2 - 5, bb.y + bb.h + 5 - 10], // b
        [bb.x + bb.w + 5 - 10, bb.y + bb.h + 5 - 10] // br
      ];
      handles.forEach(([x,y]) => {
        ctx.fillRect(x, y, 10, 10);
      });
    }
  }
  ctx.restore();
}

function getBoundingBox(obj) {
  switch(obj.type) {
    case 'line':
    case 'arrow':
    case 'measure': {
      const x = Math.min(obj.x1,obj.x2), y = Math.min(obj.y1,obj.y2);
      return {x, y, w:Math.abs(obj.x2-obj.x1)||1, h:Math.abs(obj.y2-obj.y1)||1};
    }
    case 'rect': return {x:obj.x, y:obj.y, w:obj.w||1, h:obj.h||1};
    case 'circle': return {x:obj.cx-obj.rx, y:obj.cy-obj.ry, w:obj.rx*2, h:obj.ry*2};
    case 'pen':
    case 'poly': {
      if (!obj.points||!obj.points.length) return null;
      const xs = obj.points.map(p=>p.x), ys = obj.points.map(p=>p.y);
      const x=Math.min(...xs), y=Math.min(...ys);
      return {x, y, w:Math.max(...xs)-x||1, h:Math.max(...ys)-y||1};
    }
    case 'text': return {x:obj.x, y:obj.y-obj.fontSize, w:200, h:(obj.text||'').split('\n').length*(obj.fontSize||14)*1.4+4};
    case 'symbol': return {x:obj.x, y:obj.y, w:obj.w, h:obj.h};
    default: return null;
  }
}

function redrawAll() {
  const w = PAPER_WIDTH, h = PAPER_HEIGHT;
  mainCtx.clearRect(0,0,w,h);
  objects.forEach(obj => {
    drawObject(mainCtx, obj, selectedObjects.includes(obj));
  });
  updateStatus();
}

function clearOverlay() {
  overlayCtx.clearRect(0,0,overlayCvs.width, overlayCvs.height);
}

// ── STATUS ────────────────────────────────────────────────
function updateStatus() {
  document.getElementById('status-tool').textContent    = 'TOOL: ' + currentTool.toUpperCase();
  document.getElementById('status-objects').textContent = 'OBJ: ' + objects.length;
  document.getElementById('status-snap').textContent    = 'SNAP: ' + (snapToGrid ? 'ON' : 'OFF');
  document.getElementById('status-grid').textContent    = 'GRID: ' + (showGrid ? 'ON' : 'OFF');
}
function setStatusMsg(msg, dur=2500) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  clearTimeout(setStatusMsg._t);
  if (dur>0) setStatusMsg._t = setTimeout(()=>el.textContent='', dur);
}

// ── TOOL CONTROL ─────────────────────────────────────────
function setTool(t) {
  if (currentTool === 'poly' && polyPoints.length > 1) finishPoly();
  commitTextOverlay();
  currentTool = t;
  document.querySelectorAll('[data-tool]').forEach(b => {
    b.classList.toggle('active', b.dataset.tool === t);
  });
  overlayCvs.style.cursor = t === 'select' ? 'default' :
                             t === 'eraser' ? 'cell' :
                             t === 'text'   ? 'text' : 'crosshair';
  clearOverlay();
  polyPoints = [];
  updateStatus();
}

function setStrokeColor(c) {
  strokeColor = c;
  document.getElementById('swatch-stroke').style.background = c;
  document.getElementById('swatch-stroke').dataset.color = c;
}

function setFillColor(c) {
  fillColor = c;
  const sw = document.getElementById('swatch-fill');
  sw.style.background = c === 'transparent' ? 'transparent' : c;
  sw.style.borderStyle = c === 'transparent' ? 'dashed' : 'solid';
  sw.dataset.color = c;
}

function setStrokeWidth(w) {
  strokeWidth = w;
  document.getElementById('stroke-width-input').value = w;
  document.querySelectorAll('.stroke-btn').forEach(b => b.classList.remove('active'));
}

function setLineDash(d) {
  lineDash = d;
  document.querySelectorAll('[id^="ls-"]').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('ls-' + d);
  if (el) el.classList.add('active');
}

function setFontSize(s) { fontSize = parseInt(s); }
function setOpacity(v) {
  globalOpacity = v / 100;
}

let _cpTarget = null;
function openColorPicker(target, el) {
  colorPickerTarget = target;
  _cpTarget = el;
  const inp = document.getElementById('color-picker-input');
  inp.value = target === 'stroke' ? (strokeColor === '#1F2937' ? '#1F2937' : strokeColor) : (fillColor === 'transparent' ? '#ffffff' : fillColor);
  inp.click();
}
function applyColorPicker() {
  const c = document.getElementById('color-picker-input').value;
  if (colorPickerTarget === 'stroke') setStrokeColor(c);
  else setFillColor(c);
}

function toggleGrid() {
  showGrid = !showGrid;
  const btn = document.getElementById('grid-btn');
  btn.classList.toggle('active', showGrid);
  drawGrid();
  redrawAll();
}

function toggleSnap() {
  snapToGrid = !snapToGrid;
  document.getElementById('snap-btn').classList.toggle('active', snapToGrid);
  updateStatus();
}

// ── ZOOM / PAN ────────────────────────────────────────────
function zoomBy(delta) {
  zoom = Math.max(0.5, Math.min(3, zoom + delta));
  paper.style.transform = `scale(${zoom})`;
  paper.style.transformOrigin = 'top center';
  redrawAll();
}

function resetZoom() {
  zoom = 1;
  paper.style.transform = 'scale(1)';
  paper.style.transformOrigin = 'top center';
  redrawAll();
}

// ── POINTER EVENTS ───────────────────────────────────────
function getPos(e) {
  const rect = overlayCvs.getBoundingClientRect();
  let cx, cy;
  if (e.touches && e.touches.length) {
    cx = e.touches[0].clientX - rect.left;
    cy = e.touches[0].clientY - rect.top;
  } else {
    cx = e.clientX - rect.left;
    cy = e.clientY - rect.top;
  }
  return { sx: cx, sy: cy, x: cx / zoom, y: cy / zoom };
}

function getObjAtPoint(wx, wy) {
  for (let i = objects.length-1; i >= 0; i--) {
    const obj = objects[i];
    const bb = getBoundingBox(obj);
    if (!bb) continue;
    const pad = Math.max(8, (obj.strokeWidth||2)*2);
    if (wx >= bb.x - pad && wx <= bb.x + bb.w + pad &&
        wy >= bb.y - pad && wy <= bb.y + bb.h + pad) {
      return obj;
    }
  }
  return null;
}

function getResizeHandleAtPoint(obj, wx, wy) {
  const bb = getBoundingBox(obj);
  if (!bb) return null;
  
  const pad = 8; // tolerance around handle centers
  const handles = [
    {x: bb.x - 5, y: bb.y - 5, w: 10, h: 10, corner: 'tl'},
    {x: bb.x + bb.w/2 - 5, y: bb.y - 5, w: 10, h: 10, corner: 't'},
    {x: bb.x + bb.w - 5, y: bb.y - 5, w: 10, h: 10, corner: 'tr'},
    {x: bb.x - 5, y: bb.y + bb.h/2 - 5, w: 10, h: 10, corner: 'l'},
    {x: bb.x + bb.w - 5, y: bb.y + bb.h/2 - 5, w: 10, h: 10, corner: 'r'},
    {x: bb.x - 5, y: bb.y + bb.h - 5, w: 10, h: 10, corner: 'bl'},
    {x: bb.x + bb.w/2 - 5, y: bb.y + bb.h - 5, w: 10, h: 10, corner: 'b'},
    {x: bb.x + bb.w - 5, y: bb.y + bb.h - 5, w: 10, h: 10, corner: 'br'},
  ];
  
  for (let h of handles) {
    if (wx >= h.x - pad && wx <= h.x + h.w + pad && 
        wy >= h.y - pad && wy <= h.y + h.h + pad) {
      return h.corner;
    }
  }
  return null;
}

function makeObj(extra) {
  return {
    id: Date.now() + Math.random(),
    strokeColor, fillColor, strokeWidth, lineDash,
    fontSize, opacity: globalOpacity,
    ...extra
  };
}

overlayCvs.addEventListener('pointerdown', onPointerDown);
overlayCvs.addEventListener('pointermove', onPointerMove);
overlayCvs.addEventListener('pointerup',   onPointerUp);

function onPointerDown(e) {
  if (e.button === 1 || (e.button === 0 && e.altKey)) {
    isPanning = true;
    panStart = {x: e.clientX, y: e.clientY};
    overlayCvs.setPointerCapture(e.pointerId);
    return;
  }

  hideCtxMenu();
  commitTextOverlay();

  const pos = getPos(e);
  const wp  = snapPt({x: pos.x, y: pos.y});

  if (e.button === 2) { handleRightClick(e, pos); return; }

  if (currentTool === 'select') {
    const hit = getObjAtPoint(pos.x, pos.y);
    if (hit) {
      const handle = getResizeHandleAtPoint(hit, pos.x, pos.y);
      if (handle) {
        resizingObj = hit;
        resizeCorner = handle;
        overlayCvs.setPointerCapture(e.pointerId);
      } else {
        selectedObjects = [hit];
        dragObj = hit;
        const bb = getBoundingBox(hit);
        dragOffset = { x: pos.x - (bb ? bb.x : pos.x), y: pos.y - (bb ? bb.y : pos.y) };
        overlayCvs.setPointerCapture(e.pointerId);
      }
      redrawAll();
    } else {
      selectedObjects = [];
      dragObj = null;
      redrawAll();
    }
    return;
  }

  if (currentTool === 'eraser') {
    const hit = getObjAtPoint(pos.x, pos.y);
    if (hit) { saveUndo(); objects = objects.filter(o=>o!==hit); redrawAll(); }
    return;
  }

  if (currentTool === 'text') {
    placeTextInput(wp.x, wp.y);
    return;
  }

  if (currentTool === 'poly') {
    polyPoints.push({x: wp.x, y: wp.y});
    return;
  }

  isDrawing = true;
  drawStart   = {x: wp.x, y: wp.y};
  drawCurrent = {x: wp.x, y: wp.y};
  overlayCvs.setPointerCapture(e.pointerId);
}

function onPointerMove(e) {
  const pos = getPos(e);

  document.getElementById('status-coords').textContent =
    `X: ${Math.round(pos.x)} Y: ${Math.round(pos.y)}`;

  if (isPanning) {
    const dx = e.clientX - panStart.x;
    const dy = e.clientY - panStart.y;
    paper.style.marginLeft = dx + 'px';
    paper.style.marginTop = dy + 'px';
    return;
  }

  if (resizingObj && e.buttons === 1) {
    resizeObjectCorner(resizingObj, resizeCorner, pos.x, pos.y);
    redrawAll();
    return;
  }

  if (currentTool === 'select' && dragObj && e.buttons === 1) {
    const pos2 = getPos(e);
    const wp = snapPt({x: pos2.x, y: pos2.y});
    moveObject(dragObj, wp.x - dragOffset.x, wp.y - dragOffset.y);
    redrawAll();
    return;
  }

  if (currentTool === 'poly' && polyPoints.length > 0) {
    const wp = snapPt({x:pos.x, y:pos.y});
    clearOverlay();
    overlayCtx.save();
    overlayCtx.globalAlpha = globalOpacity;
    overlayCtx.strokeStyle = strokeColor;
    overlayCtx.lineWidth   = strokeWidth;
    setOverlayDash(overlayCtx);
    overlayCtx.beginPath();
    overlayCtx.moveTo(polyPoints[0].x, polyPoints[0].y);
    for (let i=1;i<polyPoints.length;i++) {
      overlayCtx.lineTo(polyPoints[i].x, polyPoints[i].y);
    }
    overlayCtx.lineTo(wp.x, wp.y);
    overlayCtx.stroke();
    overlayCtx.restore();
    return;
  }

  if (!isDrawing) return;

  const wp = snapPt({x: pos.x, y: pos.y});
  drawCurrent = wp;

  clearOverlay();
  drawPreview(overlayCtx, drawStart, drawCurrent);
}

function onPointerUp(e) {
  if (isPanning) { 
    isPanning = false; 
    paper.style.marginLeft = '0';
    paper.style.marginTop = '0';
    return; 
  }
  if (resizingObj) {
    resizingObj = null;
    resizeCorner = null;
    return;
  }
  if (currentTool === 'select') { dragObj = null; return; }

  if (!isDrawing) return;
  isDrawing = false;

  const wp = snapPt(drawCurrent);
  clearOverlay();

  const dx = Math.abs(wp.x - drawStart.x);
  const dy = Math.abs(wp.y - drawStart.y);
  if (dx < 2 && dy < 2 && currentTool !== 'pen') return;

  saveUndo();
  let obj = null;

  switch(currentTool) {
    case 'pen':
      break;
    case 'line':
      obj = makeObj({type:'line', x1:drawStart.x, y1:drawStart.y, x2:wp.x, y2:wp.y});
      break;
    case 'arrow':
      obj = makeObj({type:'arrow', x1:drawStart.x, y1:drawStart.y, x2:wp.x, y2:wp.y});
      break;
    case 'rect': {
      const x = Math.min(drawStart.x, wp.x), y = Math.min(drawStart.y, wp.y);
      obj = makeObj({type:'rect', x, y, w:Math.abs(wp.x-drawStart.x), h:Math.abs(wp.y-drawStart.y)});
      break;
    }
    case 'circle': {
      const cx = (drawStart.x+wp.x)/2, cy = (drawStart.y+wp.y)/2;
      const rx = Math.abs(wp.x-drawStart.x)/2, ry = Math.abs(wp.y-drawStart.y)/2;
      obj = makeObj({type:'circle', cx, cy, rx:rx||4, ry:ry||4});
      break;
    }
    case 'measure':
      obj = makeObj({type:'measure', x1:drawStart.x, y1:drawStart.y, x2:wp.x, y2:wp.y, unit:' ft'});
      break;
  }

  if (obj) { objects.push(obj); redrawAll(); }
}

// Pen tool
overlayCvs.addEventListener('pointerdown', e => {
  if (currentTool !== 'pen' || e.button !== 0) return;
  const pos = getPos(e);
  const wp = snapPt({x:pos.x, y:pos.y});
  saveUndo();
  const penObj = makeObj({type:'pen', points:[wp]});
  objects.push(penObj);
  overlayCvs._penObj = penObj;
}, {capture: true});

overlayCvs.addEventListener('pointermove', e => {
  if (currentTool !== 'pen' || !overlayCvs._penObj || e.buttons !== 1) return;
  const pos = getPos(e);
  const wp = snapPt({x:pos.x, y:pos.y});
  overlayCvs._penObj.points.push(wp);
  redrawAll();
});

overlayCvs.addEventListener('pointerup', e => {
  if (currentTool !== 'pen') return;
  overlayCvs._penObj = null;
});

// ── POLY DOUBLE-CLICK TO FINISH ───────────────────────────
overlayCvs.addEventListener('dblclick', e => {
  if (currentTool === 'poly') { finishPoly(); }
});

function finishPoly() {
  if (polyPoints.length < 2) { polyPoints = []; return; }
  saveUndo();
  objects.push(makeObj({type:'poly', points:[...polyPoints], closed: false}));
  polyPoints = [];
  clearOverlay();
  redrawAll();
  setStatusMsg('Poly finished');
}

// ── PREVIEW ──────────────────────────────────────────────
function setOverlayDash(ctx) {
  const sw = strokeWidth;
  if (lineDash==='dashed')      ctx.setLineDash([sw*4, sw*3]);
  else if (lineDash==='dotted') ctx.setLineDash([sw*1, sw*4]);
  else                          ctx.setLineDash([]);
}

function drawPreview(ctx, start, cur) {
  ctx.save();
  ctx.globalAlpha = globalOpacity;
  ctx.strokeStyle = strokeColor;
  ctx.fillStyle   = fillColor;
  ctx.lineWidth   = strokeWidth;
  setOverlayDash(ctx);

  switch(currentTool) {
    case 'line': {
      ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(cur.x, cur.y); ctx.stroke();
      break;
    }
    case 'arrow': {
      ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(cur.x, cur.y); ctx.stroke();
      ctx.fillStyle = strokeColor;
      drawArrowHead(ctx, start.x, start.y, cur.x, cur.y, strokeWidth*3.5);
      break;
    }
    case 'rect': {
      const x=Math.min(start.x,cur.x), y=Math.min(start.y,cur.y);
      const w=Math.abs(cur.x-start.x), h=Math.abs(cur.y-start.y);
      if (fillColor && fillColor!=='transparent') ctx.fillRect(x,y,w,h);
      ctx.strokeRect(x,y,w,h);
      break;
    }
    case 'circle': {
      const cx=(start.x+cur.x)/2, cy=(start.y+cur.y)/2;
      const rx=Math.abs(cur.x-start.x)/2, ry=Math.abs(cur.y-start.y)/2;
      ctx.beginPath(); ctx.ellipse(cx,cy,rx||2,ry||2,0,0,Math.PI*2);
      if (fillColor && fillColor!=='transparent') ctx.fill();
      ctx.stroke();
      break;
    }
    case 'measure': {
      ctx.setLineDash([strokeWidth*4, strokeWidth*3]);
      ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(cur.x, cur.y); ctx.stroke();
      ctx.setLineDash([]);
      const ang = Math.atan2(cur.y-start.y, cur.x-start.x) + Math.PI/2;
      const tk=8;
      [[start.x,start.y],[cur.x,cur.y]].forEach(([px,py])=>{
        ctx.beginPath();
        ctx.moveTo(px+Math.cos(ang)*tk, py+Math.sin(ang)*tk);
        ctx.lineTo(px-Math.cos(ang)*tk, py-Math.sin(ang)*tk);
        ctx.stroke();
      });
      const dist = Math.sqrt((cur.x-start.x)**2+(cur.y-start.y)**2).toFixed(1);
      ctx.fillStyle = strokeColor;
      ctx.font = `bold 12px 'Share Tech Mono',monospace`;
      const label = dist + ' ft';
      const mx=(start.x+cur.x)/2, my=(start.y+cur.y)/2;
      ctx.save();
      ctx.translate(mx,my);
      const ta = Math.atan2(cur.y-start.y,cur.x-start.x);
      if (ta>Math.PI/2||ta<-Math.PI/2) ctx.rotate(ta+Math.PI); else ctx.rotate(ta);
      ctx.fillText(label, -ctx.measureText(label).width/2, -6);
      ctx.restore();
      break;
    }
  }
  ctx.restore();
}

// ── RESIZE OBJECTS ─────────────────────────────────────────
function resizeObjectCorner(obj, corner, newX, newY) {
  const bb = getBoundingBox(obj);
  if (!bb) return;

  const wp = snapPt({x: newX, y: newY});

  switch(obj.type) {
    case 'rect': {
      if (corner === 'tl') {
        obj.w = bb.x + bb.w - wp.x;
        obj.h = bb.y + bb.h - wp.y;
        obj.x = wp.x;
        obj.y = wp.y;
      } else if (corner === 'tr') {
        obj.w = wp.x - obj.x;
        obj.h = bb.y + bb.h - wp.y;
        obj.y = wp.y;
      } else if (corner === 'bl') {
        obj.w = bb.x + bb.w - wp.x;
        obj.h = wp.y - obj.y;
        obj.x = wp.x;
      } else if (corner === 'br') {
        obj.w = wp.x - obj.x;
        obj.h = wp.y - obj.y;
      } else if (corner === 't') {
        obj.h = bb.y + bb.h - wp.y;
        obj.y = wp.y;
      } else if (corner === 'b') {
        obj.h = wp.y - obj.y;
      } else if (corner === 'l') {
        obj.w = bb.x + bb.w - wp.x;
        obj.x = wp.x;
      } else if (corner === 'r') {
        obj.w = wp.x - obj.x;
      }
      obj.w = Math.max(10, obj.w);
      obj.h = Math.max(10, obj.h);
      break;
    }
    case 'circle': {
      const newRx = Math.abs(wp.x - obj.cx);
      const newRy = Math.abs(wp.y - obj.cy);
      obj.rx = Math.max(5, newRx);
      obj.ry = Math.max(5, newRy);
      break;
    }
    case 'line':
    case 'arrow':
    case 'measure': {
      if (corner.includes('l') || corner === 't' || corner === 'b') {
        obj.x1 = wp.x;
        obj.y1 = wp.y;
      } else {
        obj.x2 = wp.x;
        obj.y2 = wp.y;
      }
      break;
    }
    case 'symbol': {
      if (corner === 'br') {
        const newW = wp.x - obj.x;
        const newH = wp.y - obj.y;
        obj.w = Math.max(30, newW);
        obj.h = Math.max(30, newH);
      } else if (corner === 'tl') {
        const newW = obj.x + obj.w - wp.x;
        const newH = obj.y + obj.h - wp.y;
        obj.x = wp.x;
        obj.y = wp.y;
        obj.w = Math.max(30, newW);
        obj.h = Math.max(30, newH);
      }
      break;
    }
  }
}

// ── MOVE OBJECTS ─────────────────────────────────────────
function moveObject(obj, newX, newY) {
  const bb = getBoundingBox(obj);
  if (!bb) return;
  const dx = newX - bb.x, dy = newY - bb.y;
  switch(obj.type) {
    case 'line': case 'arrow': case 'measure':
      obj.x1+=dx; obj.y1+=dy; obj.x2+=dx; obj.y2+=dy; break;
    case 'rect': obj.x+=dx; obj.y+=dy; break;
    case 'circle': obj.cx+=dx; obj.cy+=dy; break;
    case 'pen': case 'poly':
      obj.points = obj.points.map(p=>({x:p.x+dx, y:p.y+dy})); break;
    case 'text': obj.x+=dx; obj.y+=dy; break;
    case 'symbol': obj.x+=dx; obj.y+=dy; break;
  }
}

// ── TEXT INPUT ────────────────────────────────────────────
function placeTextInput(wx, wy) {
  textTA.style.display = 'block';
  textTA.style.left = wx + 'px';
  textTA.style.top  = (wy - fontSize) + 'px';
  textTA.style.fontSize = fontSize + 'px';
  textTA.style.fontFamily = "'Share Tech Mono', monospace";
  textTA.style.color = strokeColor;
  textTA.style.background = 'transparent';
  textTA.value = '';
  textTA.focus();
  activeTextObj = { wx, wy };
  textTA.oninput = () => autoResizeTA();
  textTA.onkeydown = e => {
    if (e.key === 'Escape') commitTextOverlay();
    if (e.key === 'Enter' && !e.shiftKey) { commitTextOverlay(); e.preventDefault(); }
  };
}

function autoResizeTA() {
  textTA.style.height = 'auto';
  textTA.style.height = textTA.scrollHeight + 'px';
  const lines = textTA.value.split('\n');
  let maxW = 0;
  const testCtx = mainCtx;
  testCtx.font = `${fontSize}px 'Share Tech Mono',monospace`;
  lines.forEach(l => { const m = testCtx.measureText(l); if(m.width>maxW) maxW=m.width; });
  textTA.style.width = Math.max(80, maxW+20) + 'px';
}

function commitTextOverlay() {
  if (textTA.style.display === 'none') return;
  const text = textTA.value.trim();
  if (text && activeTextObj) {
    saveUndo();
    objects.push(makeObj({
      type:'text', text, x:activeTextObj.wx, y:activeTextObj.wy,
      fontSize, fontFamily:"'Share Tech Mono', monospace"
    }));
    redrawAll();
  }
  textTA.style.display = 'none';
  textTA.value = '';
  activeTextObj = null;
}

// ── UNDO / REDO ───────────────────────────────────────────
function saveUndo() {
  undoStack.push(JSON.stringify(objects));
  if (undoStack.length > 80) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify(objects));
  objects = JSON.parse(undoStack.pop());
  selectedObjects = [];
  redrawAll();
  setStatusMsg('Undo');
}

function redo() {
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify(objects));
  objects = JSON.parse(redoStack.pop());
  selectedObjects = [];
  redrawAll();
  setStatusMsg('Redo');
}

// ── CONTEXT MENU ──────────────────────────────────────────
function handleRightClick(e, pos) {
  e.preventDefault ? e.preventDefault() : null;
  const hit = getObjAtPoint(pos.x, pos.y);
  if (hit) { selectedObjects = [hit]; redrawAll(); }
  const menu = document.getElementById('ctx-menu');
  const rect = paper.getBoundingClientRect();
  menu.style.left = (pos.sx + rect.left) + 'px';
  menu.style.top  = (pos.sy + rect.top) + 'px';
  menu.style.display = 'block';
}

function hideCtxMenu() {
  document.getElementById('ctx-menu').style.display = 'none';
}

overlayCvs.addEventListener('contextmenu', e => {
  e.preventDefault();
  const pos = getPos(e);
  handleRightClick(e, pos);
});

document.addEventListener('click', hideCtxMenu);

function ctxDelete() {
  if (!selectedObjects.length) return;
  saveUndo();
  objects = objects.filter(o => !selectedObjects.includes(o));
  selectedObjects = [];
  redrawAll();
}
function ctxCopy() {
  if (!selectedObjects.length) return;
  clipboard = JSON.parse(JSON.stringify(selectedObjects));
  setStatusMsg('Copied');
}
function ctxPaste() {
  if (!clipboard) return;
  saveUndo();
  clipboard.forEach(obj => {
    const n = JSON.parse(JSON.stringify(obj));
    n.id = Date.now()+Math.random();
    moveObject(n, (getBoundingBox(n)||{x:0}).x+20, (getBoundingBox(n)||{y:0}).y+20);
    objects.push(n);
  });
  redrawAll();
  setStatusMsg('Pasted');
}
function ctxDuplicate() { ctxCopy(); ctxPaste(); }
function ctxBringFront() {
  if (!selectedObjects.length) return;
  saveUndo();
  selectedObjects.forEach(o => {
    objects = objects.filter(x=>x!==o);
    objects.push(o);
  });
  redrawAll();
}
function ctxSendBack() {
  if (!selectedObjects.length) return;
  saveUndo();
  selectedObjects.forEach(o => {
    objects = objects.filter(x=>x!==o);
    objects.unshift(o);
  });
  redrawAll();
}

// ── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey||e.metaKey) && (e.key==='y'||(e.shiftKey&&e.key==='z'))) { e.preventDefault(); redo(); }
  if ((e.ctrlKey||e.metaKey) && e.key==='c') ctxCopy();
  if ((e.ctrlKey||e.metaKey) && e.key==='v') ctxPaste();
  if (e.key==='Delete'||e.key==='Backspace') ctxDelete();
  if (e.key==='Escape') {
    if (currentTool==='poly' && polyPoints.length>1) finishPoly();
    commitTextOverlay();
    selectedObjects=[];
    clearOverlay();
    redrawAll();
  }
  if (e.key==='+') zoomBy(0.2);
  if (e.key==='-') zoomBy(-0.2);
  const map={v:'select',p:'pen',l:'line',a:'arrow',r:'rect',c:'circle',m:'measure',t:'text',e:'eraser'};
  if (!e.ctrlKey && !e.metaKey && map[e.key.toLowerCase()]) setTool(map[e.key.toLowerCase()]);
});

// ── CLEAR ─────────────────────────────────────────────────
function confirmClear() {
  if (!objects.length || confirm('Clear the entire canvas? This cannot be undone.')) {
    saveUndo();
    objects = [];
    selectedObjects = [];
    polyPoints = [];
    commitTextOverlay();
    clearOverlay();
    redrawAll();
    setStatusMsg('Canvas cleared');
  }
}

  }
  ctx.font='7px monospace'; ctx.fillStyle='#1F2937';
  ctx.fillText('PAD',w/2-10,h/2+3);
}
function drawSym_ugLine(ctx,w,h) {
  ctx.setLineDash([6,3]);
  ctx.beginPath(); ctx.moveTo(5,h/2); ctx.lineTo(w-5,h/2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.font='6px monospace'; ctx.fillStyle='#1F2937';
  ctx.fillText('U.G.',5,h/2-4);
}
function drawSym_conduit(ctx,w,h) {
  ctx.beginPath(); ctx.moveTo(5,h/2-6); ctx.lineTo(w-5,h/2-6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,h/2+6); ctx.lineTo(w-5,h/2+6); ctx.stroke();
  for(let i=0;i<5;i++){
    const x=10+i*10;
    ctx.beginPath(); ctx.moveTo(x,h/2-6); ctx.lineTo(x,h/2+6); ctx.stroke();
  }
}

// ── BUILD SYMBOL PANEL ────────────────────────────────────
function buildSymPanel() {
  const scroll = document.getElementById('sym-scroll');
  const cats = {};
  SYMBOLS.forEach(s => {
    if (!cats[s.cat]) cats[s.cat] = [];
    cats[s.cat].push(s);
  });
  scroll.innerHTML = '';
  Object.entries(cats).forEach(([cat, syms]) => {
    const div = document.createElement('div');
    div.className = 'sym-category'; div.textContent = cat;
    scroll.appendChild(div);
    const grid = document.createElement('div');
    grid.className = 'sym-grid';
    syms.forEach(sym => {
      const btn = document.createElement('button');
      btn.className = 'sym-btn';
      btn.dataset.name = sym.name.toLowerCase();
      const imgData = symCanvas(sym.draw);
      const img = document.createElement('canvas');
      img.width = img.height = 40;
      const ictx = img.getContext('2d');
      ictx.strokeStyle = '#1F2937';
      ictx.fillStyle = 'transparent';
      ictx.lineWidth = 1.8;
      ictx.lineCap = 'round';
      ictx.lineJoin = 'round';
      sym.draw(ictx, 40, 40);
      btn.appendChild(img);
      const lbl = document.createElement('span');
      lbl.textContent = sym.name;
      btn.appendChild(lbl);
      btn.addEventListener('click', () => placeSymbol(sym));
      grid.appendChild(btn);
    });
    scroll.appendChild(grid);
  });
}

function filterSymbols(q) {
  const lower = q.toLowerCase();
  document.querySelectorAll('.sym-btn').forEach(btn => {
    btn.style.display = btn.dataset.name.includes(lower) ? '' : 'none';
  });
}

function toggleSymPanel() {
  const panel = document.getElementById('sym-panel');
  panel.classList.toggle('open');
  const btn = document.getElementById('tool-elec');
  btn.classList.toggle('active', panel.classList.contains('open'));
}

function placeSymbol(sym) {
  const cx = PAPER_WIDTH / 2 - 30;
  const cy = PAPER_HEIGHT / 2 - 30;
  saveUndo();
  const imgData = symCanvas(sym.draw);
  objects.push(makeObj({
    type: 'symbol',
    x: cx, y: cy,
    w: 60, h: 60,
    imgData,
    symName: sym.name
  }));
  redrawAll();
  setStatusMsg(sym.name + ' placed');
}

// ── AUTO-SAVE TO LOCALSTORAGE ─────────────────────────────
const SAVE_KEY = 'aog_drawpad_objects';
function autoSave() {
  try {
    const data = objects.map(o => {
      const d = {...o};
      if (d.type === 'symbol') delete d.imgData;
      return d;
    });
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e){}
}
setInterval(autoSave, 10000);

// ── INIT ─────────────────────────────────────────────────
(function init() {
  const saved = localStorage.getItem(THEME_KEY);
  const preferDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved ? saved === 'dark' : preferDark);

  const tbVis = localStorage.getItem(TOOLBAR_VISIBLE_KEY);
  if (tbVis === 'false') {
    toolbarVisible = false;
    toolbar.classList.add('toolbar-hidden');
  }

  document.getElementById('grid-btn').classList.toggle('active', showGrid);
  buildSymPanel();
  initCanvases();

  if (darkMode) {
    setStrokeColor('#E0F7FF');
    document.getElementById('swatch-stroke').style.background = '#E0F7FF';
  }

  setStatusMsg('8.5x11" drawing pad ready | Press H to toggle toolbar | Keyboard: V=select P=pen L=line A=arrow R=rect C=circle T=text M=measure E=eraser', 6000);
  updateStatus();
})();

// Keyboard shortcut for toolbar toggle (H key)
document.addEventListener('keydown', e => {
  if (e.key === 'h' || e.key === 'H') {
    if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      toggleToolbar();
    }
  }
});
</script>
