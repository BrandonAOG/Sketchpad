<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Always On Generators – Drawing Pad</title>
<!-- Fonts loaded from Google with offline fallback via SW -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<script>
// ── SERVICE WORKER (offline support) ──────────────────────
if ('serviceWorker' in navigator) {
  const SW_CODE = `
const CACHE = 'aog-drawpad-v1';
const ASSETS = [self.location.href];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting()));
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(() => self.clients.claim()));
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).then(res => {
      if (!res || res.status !== 200 || res.type === 'opaque') return res;
      const clone = res.clone();
      caches.open(CACHE).then(c => c.put(e.request, clone));
      return res;
    }).catch(() => caches.match(e.request)))
  );
});
`;
  const blob = new Blob([SW_CODE], {type:'application/javascript'});
  const swURL = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL).then(reg => {
    console.log('[AOG] Service worker registered, scope:', reg.scope);
  }).catch(e => console.warn('[AOG] SW registration failed:', e));
}
</script>
<style>
:root {
  --cyan: #D97706;
  --cyan-dim: #B45309;
  --amber: #D97706;
  --green: #059669;
  --red: #DC2626;
  --bg: #FFFFFF;
  --bg2: #F8F8F8;
  --bg3: #F0F0F0;
  --panel: #FFFFFF;
  --border: rgba(217,119,6,0.25);
  --border-bright: rgba(217,119,6,0.5);
  --text: #1F2937;
  --text-muted: #6B7280;
  --text-dim: #9CA3AF;
  --glow: 0 0 8px rgba(217,119,6,0.3), 0 0 20px rgba(217,119,6,0.1);
  --canvas-bg: #ffffff;
  --grid-color: rgba(217,119,6,0.12);
  --font-display: 'Orbitron', monospace;
  --font-mono: 'Share Tech Mono', monospace;
  --font-body: 'Exo 2', sans-serif;
  --toolbar-bg: #ffffff;
  --tool-active: rgba(217,119,6,0.18);
  --tool-border: rgba(217,119,6,0.4);
  /* 8.5x11 at 96dpi */
  --page-w: 816px;
  --page-h: 1056px;
}

body.dark-mode {
  --bg: #0A0E27;
  --bg2: #0F1535;
  --bg3: #1A2847;
  --panel: #0F1535;
  --border: rgba(0,255,200,0.08);
  --border-bright: rgba(0,255,200,0.25);
  --text: #E0F7FF;
  --text-muted: #7DD3FC;
  --text-dim: #38BDF8;
  --glow: 0 0 8px rgba(0,255,200,0.3), 0 0 16px rgba(0,255,200,0.15);
  --cyan: #00FFC8;
  --cyan-dim: #06B6D4;
  --green: #10B981;
  --red: #F43F5E;
  --canvas-bg: #0d1b2a;
  --grid-color: rgba(0,255,200,0.07);
  --toolbar-bg: #0F1535;
  --tool-active: rgba(0,255,200,0.15);
  --tool-border: rgba(0,255,200,0.3);
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}

body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  transition:background 0.3s,color 0.3s;
}

body.dark-mode{
  background:linear-gradient(135deg,#0A0E27 0%,#0F1535 25%,#0A1628 50%,#0F1535 75%,#0A0E27 100%);
}

/* ── HEADER ── */
.header{
  flex-shrink:0;
  background:var(--toolbar-bg);
  padding:4px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:2px solid var(--cyan);
  gap:8px;
  min-height:50px;
  position:relative;
  overflow:hidden;
  transition:background 0.3s,border-color 0.3s;
}

body.dark-mode .header{
  background:linear-gradient(90deg,rgba(15,21,53,0.95) 0%,rgba(26,40,71,0.85) 50%,rgba(15,21,53,0.95) 100%);
  border-bottom-color:#00FFC8;
  box-shadow:0 2px 12px rgba(0,255,200,0.1);
}

.header-logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}

.logo-img{
  width:38px;height:38px;
  object-fit:contain;
  filter:drop-shadow(0 0 6px rgba(217,119,6,0.4));
  flex-shrink:0;
}

.company-name{
  font-family:var(--font-display);
  font-size:0.75rem;
  color:var(--cyan);
  letter-spacing:2px;
  line-height:1.2;
  font-weight:700;
}

body.dark-mode .company-name{
  color:#00FFC8;
  text-shadow:0 0 10px #00FFC8,0 0 20px rgba(0,255,200,0.4);
}

.header-title{
  font-family:var(--font-display);
  font-size:0.65rem;
  color:var(--text-muted);
  letter-spacing:3px;
  text-transform:uppercase;
  white-space:nowrap;
}

.header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}

.theme-btn{
  width:32px;height:32px;
  border:1px solid var(--tool-border);
  background:rgba(217,119,6,0.05);
  border-radius:4px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--cyan);
  transition:all 0.2s;
  flex-shrink:0;
  position:relative;
}
body.dark-mode .theme-btn{background:rgba(0,255,200,0.07);color:#00FFC8;}
.theme-btn:hover{border-color:var(--cyan);box-shadow:var(--glow);}
.theme-btn svg{position:absolute;transition:all 0.3s;stroke:var(--cyan);}
body.dark-mode .theme-btn svg{stroke:#00FFC8;}
.icon-sun{opacity:1;}
.icon-moon{opacity:0;}
body.dark-mode .icon-sun{opacity:0;transform:rotate(180deg);}
body.dark-mode .icon-moon{opacity:1;}

.action-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 9px;
  border:1px solid var(--tool-border);
  background:rgba(217,119,6,0.05);
  font-family:var(--font-display);
  font-size:0.5rem;
  letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  color:var(--cyan);
  white-space:nowrap;
  min-height:28px;
  transition:all 0.15s;
  clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
}
body.dark-mode .action-btn{background:rgba(0,255,200,0.07);border-color:rgba(0,255,200,0.25);color:#00FFC8;}
.action-btn:hover{border-color:var(--cyan);box-shadow:var(--glow);}
.action-btn.danger{border-color:rgba(220,38,38,0.4);color:#DC2626;}
body.dark-mode .action-btn.danger{border-color:rgba(244,63,94,0.4);color:#F43F5E;}

/* ── TOOLBAR ── */
.toolbar{
  flex-shrink:0;
  background:var(--toolbar-bg);
  border-bottom:1px solid var(--border-bright);
  display:flex;
  align-items:center;
  gap:2px;
  padding:3px 6px;
  flex-wrap:wrap;
  transition:background 0.3s;
  position:relative;
  z-index:10;
  overflow-x:auto;
  overflow-y:hidden;
}

body.dark-mode .toolbar{
  background:linear-gradient(90deg,rgba(15,21,53,0.9) 0%,rgba(26,40,71,0.75) 100%);
}

.tool-sep{width:1px;height:26px;background:var(--border-bright);margin:0 3px;flex-shrink:0;}
body.dark-mode .tool-sep{background:rgba(0,255,200,0.2);}

.tool-btn{
  display:flex;align-items:center;justify-content:center;
  width:32px;height:32px;
  border:1px solid transparent;
  background:transparent;
  border-radius:3px;
  cursor:pointer;
  color:var(--text-muted);
  transition:all 0.15s;
  flex-shrink:0;
  position:relative;
  font-size:15px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
body.dark-mode .tool-btn{color:#7DD3FC;}
.tool-btn:hover,.tool-btn:active{border-color:var(--tool-border);background:var(--tool-active);color:var(--cyan);}
body.dark-mode .tool-btn:hover,body.dark-mode .tool-btn:active{color:#00FFC8;}
.tool-btn.active{border-color:var(--cyan);background:var(--tool-active);color:var(--cyan);box-shadow:0 0 6px rgba(217,119,6,0.2);}
body.dark-mode .tool-btn.active{border-color:#00FFC8;background:rgba(0,255,200,0.12);color:#00FFC8;box-shadow:0 0 8px rgba(0,255,200,0.25);}
.tool-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

.tool-btn-label{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:auto;min-width:32px;height:32px;
  padding:0 5px;
  border:1px solid transparent;
  background:transparent;
  border-radius:3px;
  cursor:pointer;
  color:var(--text-muted);
  transition:all 0.15s;
  flex-shrink:0;
  font-family:var(--font-display);
  font-size:0.42rem;
  letter-spacing:1px;
  text-transform:uppercase;
  gap:1px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
body.dark-mode .tool-btn-label{color:#7DD3FC;}
.tool-btn-label:hover,.tool-btn-label.active{border-color:var(--cyan);background:var(--tool-active);color:var(--cyan);}
body.dark-mode .tool-btn-label:hover,body.dark-mode .tool-btn-label.active{border-color:#00FFC8;color:#00FFC8;background:rgba(0,255,200,0.12);}
.tool-btn-label svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

.color-swatch{
  width:22px;height:22px;
  border-radius:3px;
  border:2px solid var(--border-bright);
  cursor:pointer;
  flex-shrink:0;
  transition:transform 0.15s,box-shadow 0.15s;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.color-swatch:hover{transform:scale(1.15);box-shadow:0 0 6px rgba(0,0,0,0.3);}
.color-swatch.active{border-color:var(--cyan);box-shadow:0 0 8px rgba(217,119,6,0.4);}
body.dark-mode .color-swatch.active{border-color:#00FFC8;box-shadow:0 0 8px rgba(0,255,200,0.4);}

.stroke-btn{
  display:flex;align-items:center;justify-content:center;
  width:26px;height:26px;
  border:1px solid transparent;
  background:transparent;
  border-radius:3px;
  cursor:pointer;
  flex-shrink:0;
  transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.stroke-btn:hover,.stroke-btn.active{border-color:var(--cyan);background:var(--tool-active);}
body.dark-mode .stroke-btn.active{border-color:#00FFC8;background:rgba(0,255,200,0.12);}

.toolbar-input{
  width:40px;
  font-family:var(--font-mono);
  font-size:0.65rem;
  background:var(--bg2);
  border:1px solid var(--border-bright);
  color:var(--text);
  padding:2px 3px;
  border-radius:2px;
  outline:none;
  text-align:center;
  flex-shrink:0;
}
body.dark-mode .toolbar-input{background:rgba(10,14,39,0.7);border-color:rgba(0,255,200,0.2);color:#E0F7FF;}

.toolbar-select{
  font-family:var(--font-mono);
  font-size:0.65rem;
  background:var(--bg2);
  border:1px solid var(--border-bright);
  color:var(--text);
  padding:2px 3px;
  border-radius:2px;
  outline:none;
  cursor:pointer;
  flex-shrink:0;
}
body.dark-mode .toolbar-select{background:rgba(10,14,39,0.7);border-color:rgba(0,255,200,0.2);color:#E0F7FF;}

.opacity-wrap{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.opacity-label{font-family:var(--font-display);font-size:0.42rem;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;white-space:nowrap;}
body.dark-mode .opacity-label{color:#7DD3FC;}
input[type=range].opacity-slider{width:50px;height:4px;accent-color:var(--cyan);cursor:pointer;}

/* ── PAGE CANVAS AREA ── */
.canvas-outer{
  flex:1;
  overflow:auto;
  background:var(--bg3);
  display:flex;
  align-items:flex-start;
  justify-content:flex-start;
  position:relative;
  transition:background 0.3s;
}
body.dark-mode .canvas-outer{background:#060b1a;}

.canvas-scroll-inner{
  padding:20px;
  min-width:max-content;
  min-height:max-content;
}

/* The fixed-size page */
.page-container{
  position:relative;
  width:816px;
  height:1056px;
  background:#fff;
  box-shadow:0 4px 24px rgba(0,0,0,0.2);
  flex-shrink:0;
  overflow:hidden;
}

body.dark-mode .page-container{
  background:#0d1b2a;
  box-shadow:0 4px 24px rgba(0,0,0,0.5);
}

#grid-canvas,#main-canvas,#overlay-canvas{
  position:absolute;
  top:0;left:0;
  width:816px;
  height:1056px;
  display:block;
}
#grid-canvas{z-index:0;pointer-events:none;}
#main-canvas{z-index:1;pointer-events:none;}
#overlay-canvas{z-index:2;cursor:crosshair;touch-action:none;}

/* TEXT INPUT OVERLAY */
#text-input-overlay{
  position:absolute;
  z-index:20;
  display:none;
  background:transparent;
  border:1.5px dashed var(--cyan);
  outline:none;
  font-family:var(--font-mono);
  color:var(--text);
  padding:2px 4px;
  min-width:80px;
  min-height:24px;
  resize:none;
  overflow:hidden;
  white-space:pre;
  line-height:1.4;
  caret-color:var(--cyan);
}
body.dark-mode #text-input-overlay{border-color:#00FFC8;color:#E0F7FF;caret-color:#00FFC8;}

/* ── STATUS BAR ── */
.statusbar{
  flex-shrink:0;
  height:20px;
  background:var(--toolbar-bg);
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:12px;
  padding:0 10px;
  font-family:var(--font-mono);
  font-size:0.55rem;
  color:var(--text-muted);
  transition:background 0.3s;
  overflow:hidden;
}
body.dark-mode .statusbar{background:rgba(15,21,53,0.9);color:#7DD3FC;border-top-color:rgba(0,255,200,0.1);}
.statusbar span{white-space:nowrap;}
.statusbar .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--cyan);box-shadow:0 0 5px var(--cyan);animation:blink 2s infinite;}
body.dark-mode .statusbar .dot{background:#00FFC8;box-shadow:0 0 5px #00FFC8;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* ── SYMBOL PANEL ── */
.sym-panel{
  position:fixed;
  right:0;top:0;bottom:0;
  width:190px;
  background:var(--toolbar-bg);
  border-left:1px solid var(--border-bright);
  z-index:100;
  display:flex;
  flex-direction:column;
  transition:transform 0.25s ease,background 0.3s;
  transform:translateX(100%);
  overflow:hidden;
  box-shadow:-4px 0 16px rgba(0,0,0,0.15);
}
body.dark-mode .sym-panel{background:rgba(15,21,53,0.97);border-left-color:rgba(0,255,200,0.2);}
.sym-panel.open{transform:translateX(0);}

.sym-panel-header{
  padding:8px 10px;
  border-bottom:1px solid var(--border-bright);
  font-family:var(--font-display);
  font-size:0.58rem;
  letter-spacing:2px;
  color:var(--cyan);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
body.dark-mode .sym-panel-header{color:#00FFC8;border-bottom-color:rgba(0,255,200,0.2);}

/* Symbol color controls in panel */
.sym-color-row{
  display:flex;align-items:center;gap:4px;
  padding:6px 8px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  flex-wrap:wrap;
}
.sym-color-label{font-family:var(--font-display);font-size:0.42rem;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;width:100%;margin-bottom:2px;}
body.dark-mode .sym-color-label{color:#7DD3FC;}

.sym-size-row{
  display:flex;align-items:center;gap:6px;
  padding:4px 8px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sym-size-label{font-family:var(--font-display);font-size:0.42rem;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;white-space:nowrap;}
body.dark-mode .sym-size-label{color:#7DD3FC;}
.sym-size-input{
  width:48px;
  font-family:var(--font-mono);
  font-size:0.65rem;
  background:var(--bg2);
  border:1px solid var(--border-bright);
  color:var(--text);
  padding:2px 3px;
  border-radius:2px;
  outline:none;
  text-align:center;
}
body.dark-mode .sym-size-input{background:rgba(10,14,39,0.7);border-color:rgba(0,255,200,0.2);color:#E0F7FF;}

.sym-close{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:15px;line-height:1;transition:color 0.15s;}
.sym-close:hover{color:var(--red);}

.sym-search{padding:5px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sym-search input{
  width:100%;
  font-family:var(--font-mono);
  font-size:0.65rem;
  background:var(--bg2);
  border:1px solid var(--border-bright);
  color:var(--text);
  padding:3px 5px;
  outline:none;
  border-radius:2px;
}
body.dark-mode .sym-search input{background:rgba(10,14,39,0.7);border-color:rgba(0,255,200,0.2);color:#E0F7FF;}

.sym-scroll{overflow-y:auto;flex:1;padding:5px;}
.sym-category{font-family:var(--font-display);font-size:0.47rem;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin:7px 0 3px;padding-bottom:2px;border-bottom:1px solid var(--border);}
body.dark-mode .sym-category{color:#7DD3FC;border-bottom-color:rgba(0,255,200,0.1);}
.sym-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:5px;}

.sym-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:5px 3px;
  border:1px solid var(--border);
  background:var(--bg2);
  cursor:pointer;
  border-radius:3px;
  transition:all 0.15s;
  font-family:var(--font-display);
  font-size:0.4rem;
  letter-spacing:0.5px;
  color:var(--text-muted);
  text-align:center;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
body.dark-mode .sym-btn{background:rgba(26,40,71,0.5);border-color:rgba(0,255,200,0.1);color:#7DD3FC;}
.sym-btn:hover,.sym-btn:active{border-color:var(--cyan);background:var(--tool-active);color:var(--cyan);}
body.dark-mode .sym-btn:hover,body.dark-mode .sym-btn:active{border-color:#00FFC8;color:#00FFC8;}

/* ── CANVAS-BASED resize handles — no DOM elements needed ── */

/* ── CONTEXT MENU ── */
#ctx-menu{
  position:fixed;
  z-index:200;
  background:var(--panel);
  border:1px solid var(--border-bright);
  box-shadow:0 4px 20px rgba(0,0,0,0.25);
  display:none;
  min-width:150px;
  padding:4px 0;
}
body.dark-mode #ctx-menu{background:rgba(10,14,39,0.97);border-color:rgba(0,255,200,0.25);}
.ctx-item{
  display:block;width:100%;padding:6px 12px;
  background:none;border:none;text-align:left;
  font-family:var(--font-display);font-size:0.55rem;letter-spacing:1px;
  color:var(--text);cursor:pointer;text-transform:uppercase;transition:background 0.1s;
  -webkit-tap-highlight-color:transparent;
}
body.dark-mode .ctx-item{color:#E0F7FF;}
.ctx-item:hover{background:var(--tool-active);color:var(--cyan);}
body.dark-mode .ctx-item:hover{color:#00FFC8;}
.ctx-sep{height:1px;background:var(--border);margin:3px 0;}
body.dark-mode .ctx-sep{background:rgba(0,255,200,0.1);}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:rgba(217,119,6,0.3);}
body.dark-mode ::-webkit-scrollbar-thumb{background:rgba(0,255,200,0.25);}

/* ── MOBILE ── */
@media(max-width:640px){
  .company-name{font-size:0.65rem;letter-spacing:1px;}
  .header-title{display:none;}
  .logo-img{width:32px;height:32px;}
  .action-btn{padding:3px 7px;font-size:0.45rem;}
  .sym-panel{width:160px;}
  .canvas-scroll-inner{padding:10px;}
}

/* ── PRINT ── */
@media print{
  html,body{overflow:visible!important;height:auto!important;}
  .header,.toolbar,.statusbar,.sym-panel,#ctx-menu,.sym-resize-handle{display:none!important;}
  .canvas-outer{overflow:visible!important;background:white!important;flex:none!important;}

}
</style>
</head>

  <span id="status-grid">GRID:ON</span>

<script>
/* =====================================================
   ALWAYS ON GENERATORS — DRAWING PAD v2
   8.5×11 fixed page, print-ready, mobile-friendly
   Symbol colors + resize
   ===================================================== */

// PAGE DIMENSIONS (96 DPI = 8.5x11 inches)
const PAGE_W = 816;
const PAGE_H = 1056;

// ── STATE ──────────────────────────────────────────────
const THEME_KEY = 'aog_drawpad_theme';
let darkMode = false;

let currentTool = 'select';
let strokeColor = '#1F2937';
let fillColor = 'transparent';
let strokeWidth = 2;
let lineDash = 'solid';
let fontSize = 14;
let globalOpacity = 1.0;
let showGrid = true;
let snapToGrid = false;
let gridSize = 20;

// Symbol-specific color settings
let symStrokeColor = '#1F2937';
let symFillColor = 'transparent';
let symSize = 80;
let _symColorTarget = 'main';

// Zoom applied to the page-container via CSS transform (for view only)
let viewZoom = 1.0;

// Objects array
let objects = [];
let undoStack = [];
let redoStack = [];

// Interaction state
let isDrawing = false;
let drawStart = {x:0,y:0};
let drawCurrent = {x:0,y:0};
let polyPoints = [];
let selectedObjects = [];
let dragObj = null;
let dragOffset = {x:0,y:0};
let activeTextObj = null;
let colorPickerTarget = 'stroke';

// Symbol resize — canvas-based 8 handles
let resizingSymbol = null;
let resizeHandle = null;   // which handle: 'tl','t','tr','l','r','bl','b','br'
let resizeStartPos = {x:0,y:0};
let resizeStartRect = {x:0,y:0,w:0,h:0}; // original x,y,w,h at drag start

// Clipboard
let clipboard = null;

// Pen streaming
let activePenObj = null;

// ── CANVAS REFS ─────────────────────────────────────────
const pageContainer = document.getElementById('page-container');
const gridCvs    = document.getElementById('grid-canvas');
const mainCvs    = document.getElementById('main-canvas');
const overlayCvs = document.getElementById('overlay-canvas');
const gridCtx    = gridCvs.getContext('2d');
const mainCtx    = mainCvs.getContext('2d');
const overlayCtx = overlayCvs.getContext('2d');
const textTA     = document.getElementById('text-input-overlay');
// (resize handled via overlay canvas — see onDown/onMove/onUp)

// All canvases are fixed 816x1056 — no resizing needed

// ── ZOOM (view only via CSS transform) ──────────────────
function applyViewZoom() {
  pageContainer.style.transformOrigin = 'top left';
  pageContainer.style.transform = `scale(${viewZoom})`;
  // update scroll inner size so scroll works
  const inner = document.getElementById('canvas-scroll-inner');
  inner.style.width = (PAGE_W * viewZoom + 40) + 'px';
  inner.style.height = (PAGE_H * viewZoom + 40) + 'px';
  document.getElementById('zoom-label').textContent = Math.round(viewZoom*100)+'%';
}

function adjustZoom(delta) {
  viewZoom = Math.max(0.15, Math.min(3, viewZoom + delta));
  applyViewZoom();
}

function fitPage() {
  const outer = document.getElementById('canvas-outer');
  const fw = outer.clientWidth - 40;
  const fh = outer.clientHeight - 40;
  viewZoom = Math.min(fw / PAGE_W, fh / PAGE_H);
  viewZoom = Math.max(0.15, Math.min(3, viewZoom));
  applyViewZoom();
}

// Pinch-to-zoom
let lastPinchDist = null;
document.getElementById('canvas-outer').addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.sqrt(dx*dx+dy*dy);
  }
}, {passive:true});
document.getElementById('canvas-outer').addEventListener('touchmove', e => {
  if (e.touches.length === 2 && lastPinchDist) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const delta = (dist - lastPinchDist) * 0.005;
    adjustZoom(delta);
    lastPinchDist = dist;
    e.preventDefault();
  }
}, {passive:false});
document.getElementById('canvas-outer').addEventListener('touchend', () => { lastPinchDist = null; }, {passive:true});

// Mouse wheel zoom
document.getElementById('canvas-outer').addEventListener('wheel', e => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    adjustZoom(e.deltaY < 0 ? 0.1 : -0.1);
  }
}, {passive:false});

// ── THEME ────────────────────────────────────────────────
function applyTheme(dark) {
  darkMode = dark;
  document.body.classList.toggle('dark-mode', dark);
  try { localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light'); } catch(e){}
  drawGrid();
  redrawAll();
}
document.getElementById('theme-btn').addEventListener('click', () => applyTheme(!darkMode));

// ── GRID ─────────────────────────────────────────────────
function drawGrid() {
  gridCtx.clearRect(0,0,PAGE_W,PAGE_H);
  if (!showGrid) return;

  const color = darkMode ? 'rgba(0,255,200,0.07)' : 'rgba(217,119,6,0.1)';
  const colorMaj = darkMode ? 'rgba(0,255,200,0.16)' : 'rgba(217,119,6,0.22)';

  for (let x = 0; x <= PAGE_W; x += gridSize) {
    const isMaj = (x / gridSize) % 5 === 0;
    gridCtx.strokeStyle = isMaj ? colorMaj : color;
    gridCtx.lineWidth = isMaj ? 0.8 : 0.4;
    gridCtx.beginPath(); gridCtx.moveTo(x,0); gridCtx.lineTo(x,PAGE_H); gridCtx.stroke();
  }
  for (let y = 0; y <= PAGE_H; y += gridSize) {
    const isMaj = (y / gridSize) % 5 === 0;
    gridCtx.strokeStyle = isMaj ? colorMaj : color;
    gridCtx.lineWidth = isMaj ? 0.8 : 0.4;
    gridCtx.beginPath(); gridCtx.moveTo(0,y); gridCtx.lineTo(PAGE_W,y); gridCtx.stroke();
  }
}

// ── COORD FROM EVENT ─────────────────────────────────────
function getCanvasPos(e) {
  const rect = overlayCvs.getBoundingClientRect();
  let cx, cy;
  if (e.touches && e.touches.length) {
    cx = e.touches[0].clientX - rect.left;
    cy = e.touches[0].clientY - rect.top;
  } else {
    cx = e.clientX - rect.left;
    cy = e.clientY - rect.top;
  }
  // rect size = PAGE_W*viewZoom, so divide by viewZoom to get canvas coords
  return {
    x: cx / viewZoom,
    y: cy / viewZoom
  };
}

function snapPt(p) {
  if (!snapToGrid) return p;
  return { x: Math.round(p.x/gridSize)*gridSize, y: Math.round(p.y/gridSize)*gridSize };
}

// ── DRAW HELPERS ─────────────────────────────────────────
function applyStyle(ctx, obj) {
  ctx.globalAlpha = obj.opacity !== undefined ? obj.opacity : 1;
  ctx.strokeStyle = obj.strokeColor || '#1F2937';
  ctx.lineWidth   = obj.strokeWidth || 2;
  ctx.fillStyle   = obj.fillColor || 'transparent';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.font = `${obj.fontSize||14}px ${obj.fontFamily||"'Share Tech Mono',monospace"}`;

  const dash = obj.lineDash || 'solid';
  const sw = obj.strokeWidth || 2;
  if (dash==='dashed')      ctx.setLineDash([sw*4, sw*3]);
  else if (dash==='dotted') ctx.setLineDash([sw, sw*4]);
  else                      ctx.setLineDash([]);
}

function drawArrowHead(ctx, x1,y1, x2,y2, size) {
  const angle = Math.atan2(y2-y1, x2-x1);
  ctx.save();
  ctx.translate(x2,y2);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(-size,-size/2.5);
  ctx.lineTo(-size, size/2.5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawObject(ctx, obj, isSelected) {
  ctx.save();
  applyStyle(ctx, obj);

  switch(obj.type) {
    case 'pen': {
      if (!obj.points||obj.points.length<2) break;
      ctx.beginPath();
      ctx.moveTo(obj.points[0].x, obj.points[0].y);
      for (let i=1;i<obj.points.length;i++) ctx.lineTo(obj.points[i].x, obj.points[i].y);
      ctx.stroke();
      break;
    }
    case 'line': {
      ctx.beginPath(); ctx.moveTo(obj.x1,obj.y1); ctx.lineTo(obj.x2,obj.y2); ctx.stroke();
      break;
    }
    case 'arrow': {
      ctx.beginPath(); ctx.moveTo(obj.x1,obj.y1); ctx.lineTo(obj.x2,obj.y2); ctx.stroke();
      ctx.fillStyle = obj.strokeColor;
      drawArrowHead(ctx, obj.x1,obj.y1, obj.x2,obj.y2, (obj.strokeWidth||2)*3.5);
      break;
    }
    case 'rect': {
      if (obj.fillColor&&obj.fillColor!=='transparent') ctx.fillRect(obj.x,obj.y,obj.w,obj.h);
      ctx.strokeRect(obj.x,obj.y,obj.w,obj.h);
      break;
    }
    case 'circle': {
      ctx.beginPath(); ctx.ellipse(obj.cx,obj.cy,obj.rx,obj.ry,0,0,Math.PI*2);
      if (obj.fillColor&&obj.fillColor!=='transparent') ctx.fill();
      ctx.stroke();
      break;
    }
    case 'poly': {
      if (!obj.points||obj.points.length<2) break;
      ctx.beginPath(); ctx.moveTo(obj.points[0].x, obj.points[0].y);
      for (let i=1;i<obj.points.length;i++) ctx.lineTo(obj.points[i].x, obj.points[i].y);
      if (obj.closed) { ctx.closePath(); if (obj.fillColor&&obj.fillColor!=='transparent') ctx.fill(); }
      ctx.stroke();
      break;
    }
    case 'text': {
      ctx.fillStyle = obj.strokeColor;
      ctx.globalAlpha = obj.opacity||1;
      const lines = (obj.text||'').split('\n');
      const lh = (obj.fontSize||14)*1.4;
      lines.forEach((ln,i) => ctx.fillText(ln, obj.x, obj.y + i*lh));
      break;
    }
    case 'measure': {
      ctx.setLineDash([(obj.strokeWidth||2)*4,(obj.strokeWidth||2)*3]);
      ctx.beginPath(); ctx.moveTo(obj.x1,obj.y1); ctx.lineTo(obj.x2,obj.y2); ctx.stroke();
      ctx.setLineDash([]);
      const ang = Math.atan2(obj.y2-obj.y1,obj.x2-obj.x1)+Math.PI/2;
      const tk=8;
      [[obj.x1,obj.y1],[obj.x2,obj.y2]].forEach(([px,py])=>{
        ctx.beginPath();
        ctx.moveTo(px+Math.cos(ang)*tk, py+Math.sin(ang)*tk);
        ctx.lineTo(px-Math.cos(ang)*tk, py-Math.sin(ang)*tk);
        ctx.stroke();
      });
      const dist = Math.sqrt((obj.x2-obj.x1)**2+(obj.y2-obj.y1)**2).toFixed(1);
      const label = dist + (obj.unit||' ft');
      ctx.setLineDash([]);
      ctx.fillStyle = obj.strokeColor;
      ctx.font = `bold 12px 'Share Tech Mono',monospace`;
      const mx=(obj.x1+obj.x2)/2, my=(obj.y1+obj.y2)/2;
      ctx.save(); ctx.translate(mx,my);
      const ta=Math.atan2(obj.y2-obj.y1,obj.x2-obj.x1);
      if(ta>Math.PI/2||ta<-Math.PI/2) ctx.rotate(ta+Math.PI); else ctx.rotate(ta);
      ctx.fillText(label, -ctx.measureText(label).width/2, -6);
      ctx.restore();
      break;
    }
    case 'symbol': {
      // Draw the symbol using a function
      const size = obj.w || 80;
      const sh = obj.h || size;
      const sc = obj.symColor || '#1F2937';
      const sf = obj.symFill || 'transparent';
      ctx.save();
      ctx.translate(obj.x, obj.y);
      // Scale drawing function to fit obj.w x obj.h
      const scaleX = size/60, scaleY = sh/60;
      ctx.scale(scaleX, scaleY);
      const tmpCtx = { ...ctx };
      // Use a temporary draw area
      const symFn = getSymFn(obj.symKey);
      if (symFn) {
        ctx.strokeStyle = sc;
        ctx.fillStyle = sf !== 'transparent' ? sf : 'transparent';
        ctx.lineWidth = (obj.strokeWidth||1.8) / Math.max(scaleX,scaleY);
        ctx.lineCap='round'; ctx.lineJoin='round';
        symFn(ctx, 60, 60, sc, sf);
      }
      ctx.restore();
      break;
    }
  }

  // Selection highlight
  if (isSelected) {
    ctx.globalAlpha = 1;
    ctx.setLineDash([5,3]);
    ctx.strokeStyle = darkMode ? '#00FFC8' : '#D97706';
    ctx.lineWidth = 1.5;
    const bb = getBoundingBox(obj);
    if (bb) {
      ctx.strokeRect(bb.x-6, bb.y-6, bb.w+12, bb.h+12);
      ctx.fillStyle = darkMode ? '#00FFC8' : '#D97706';
      ctx.setLineDash([]);
      [[0,0],[0.5,0],[1,0],[0,0.5],[1,0.5],[0,1],[0.5,1],[1,1]].forEach(([fx,fy])=>{
        ctx.fillRect(bb.x-6+(bb.w+12)*fx-4, bb.y-6+(bb.h+12)*fy-4, 8,8);
      });
    }
  }
  ctx.restore();
}

function getBoundingBox(obj) {
  switch(obj.type) {
    case 'line': case 'arrow': case 'measure': {
      const x=Math.min(obj.x1,obj.x2), y=Math.min(obj.y1,obj.y2);
      return {x, y, w:Math.abs(obj.x2-obj.x1)||4, h:Math.abs(obj.y2-obj.y1)||4};
    }
    case 'rect': return {x:obj.x, y:obj.y, w:obj.w||4, h:obj.h||4};
    case 'circle': return {x:obj.cx-obj.rx, y:obj.cy-obj.ry, w:obj.rx*2, h:obj.ry*2};
    case 'pen': case 'poly': {
      if (!obj.points||!obj.points.length) return null;
      const xs=obj.points.map(p=>p.x), ys=obj.points.map(p=>p.y);
      const x=Math.min(...xs), y=Math.min(...ys);
      return {x, y, w:Math.max(...xs)-x||4, h:Math.max(...ys)-y||4};
    }
    case 'text': return {x:obj.x, y:obj.y-(obj.fontSize||14), w:120, h:(obj.text||'').split('\n').length*(obj.fontSize||14)*1.4+4};
    case 'symbol': return {x:obj.x, y:obj.y, w:obj.w||80, h:obj.h||80};
    default: return null;
  }
}

// ── 8-HANDLE CANVAS RESIZE SYSTEM ─────────────────────────
const HANDLE_SIZE = 8; // half-size of each square handle

// Returns array of {id, x, y} handle centers for a bounding box
function getSymHandles(obj) {
  const {x,y,w,h} = {x:obj.x, y:obj.y, w:obj.w, h:obj.h};
  return [
    {id:'tl', x:x,      y:y},
    {id:'t',  x:x+w/2,  y:y},
    {id:'tr', x:x+w,    y:y},
    {id:'l',  x:x,      y:y+h/2},
    {id:'r',  x:x+w,    y:y+h/2},
    {id:'bl', x:x,      y:y+h},
    {id:'b',  x:x+w/2,  y:y+h},
    {id:'br', x:x+w,    y:y+h},
  ];
}

// Cursor map
const HANDLE_CURSORS = {
  tl:'nwse-resize', t:'ns-resize', tr:'nesw-resize',
  l:'ew-resize',    r:'ew-resize',
  bl:'nesw-resize', b:'ns-resize', br:'nwse-resize'
};

// Hit-test: returns handle id or null
function hitTestHandles(obj, px, py) {
  const hs = getSymHandles(obj);
  const pad = HANDLE_SIZE + 2;
  for (const h of hs) {
    if (Math.abs(px-h.x) <= pad && Math.abs(py-h.y) <= pad) return h.id;
  }
  return null;
}

// Draw selection box + 8 handles on overlay canvas
function drawSymbolHandles(obj) {
  const {x,y,w,h} = {x:obj.x,y:obj.y,w:obj.w,h:obj.h};
  overlayCtx.save();
  overlayCtx.globalAlpha=1;
  overlayCtx.strokeStyle = darkMode ? '#00FFC8' : '#D97706';
  overlayCtx.lineWidth=1.5;
  overlayCtx.setLineDash([5,3]);
  overlayCtx.strokeRect(x,y,w,h);
  overlayCtx.setLineDash([]);

  const fillC = darkMode ? '#00FFC8' : '#D97706';
  const hs = getSymHandles(obj);
  hs.forEach(h => {
    overlayCtx.fillStyle='#fff';
    overlayCtx.fillRect(h.x-HANDLE_SIZE, h.y-HANDLE_SIZE, HANDLE_SIZE*2, HANDLE_SIZE*2);
    overlayCtx.strokeStyle=fillC;
    overlayCtx.lineWidth=1.5;
    overlayCtx.setLineDash([]);
    overlayCtx.strokeRect(h.x-HANDLE_SIZE, h.y-HANDLE_SIZE, HANDLE_SIZE*2, HANDLE_SIZE*2);
  });
  overlayCtx.restore();
}

function redrawAll() {
  mainCtx.clearRect(0,0,PAGE_W,PAGE_H);
  objects.forEach(obj => drawObject(mainCtx, obj, selectedObjects.includes(obj)));
  // Draw handles on overlay for selected symbol
  clearOverlay();
  if (selectedObjects.length===1 && selectedObjects[0].type==='symbol' && currentTool==='select') {
    drawSymbolHandles(selectedObjects[0]);
  }
  updateStatus();
}

function clearOverlay() {
  overlayCtx.clearRect(0,0,PAGE_W,PAGE_H);
}

// ── RESIZE HANDLE FOR SELECTED SYMBOL ──────────────────
// (now canvas-based, no DOM needed — handled in onDown/onMove/onUp)

// ── STATUS ────────────────────────────────────────────────
function updateStatus() {
  document.getElementById('status-tool').textContent    = 'TOOL:'+currentTool.toUpperCase();
  document.getElementById('status-objects').textContent = 'OBJ:'+objects.length;
  document.getElementById('status-snap').textContent    = 'SNAP:'+(snapToGrid?'ON':'OFF');
  document.getElementById('status-grid').textContent    = 'GRID:'+(showGrid?'ON':'OFF');
}
function setStatusMsg(msg, dur=2500) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  clearTimeout(setStatusMsg._t);
  if (dur>0) setStatusMsg._t = setTimeout(()=>el.textContent='', dur);
}

// ── TOOL CONTROL ─────────────────────────────────────────
function setTool(t) {
  if (currentTool==='poly'&&polyPoints.length>1) finishPoly();
  commitTextOverlay();
  currentTool = t;
  document.querySelectorAll('[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool===t));
  overlayCvs.style.cursor = t==='select'?'default': t==='eraser'?'cell': t==='text'?'text':'crosshair';
  clearOverlay();
  polyPoints=[];
  if (t!=='select') { selectedObjects=[]; updateResizeHandle(); redrawAll(); }
  updateStatus();
}

function setStrokeColor(c) {
  strokeColor=c;
  document.getElementById('swatch-stroke').style.background=c;
  document.getElementById('swatch-stroke').dataset.color=c;
}
function setFillColor(c) {
  fillColor=c;
  const sw=document.getElementById('swatch-fill');
  sw.style.background=c==='transparent'?'transparent':c;
  sw.style.borderStyle=c==='transparent'?'dashed':'solid';
  sw.dataset.color=c;
}
function setStrokeWidth(w) {
  strokeWidth=w;
  document.getElementById('stroke-width-input').value=w;
}
function setLineDash(d) {
  lineDash=d;
  document.querySelectorAll('[id^="ls-"]').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('ls-'+d);
  if(el) el.classList.add('active');
}
function setFontSize(s) { fontSize=parseInt(s); }
function setOpacity(v) { globalOpacity=v/100; document.getElementById('opacity-val').textContent=v+'%'; }

let _cpTarget2=null;
function openColorPicker(target, el) {
  colorPickerTarget=target; _cpTarget2=el;
  const inp=document.getElementById('color-picker-input');
  inp.value=target==='stroke'?strokeColor:(fillColor==='transparent'?'#ffffff':fillColor);
  inp.click();
}
function applyColorPicker() {
  const c=document.getElementById('color-picker-input').value;
  if(colorPickerTarget==='stroke') setStrokeColor(c); else setFillColor(c);
}

// Symbol colors
function setSymColor(c) {

  document.getElementById('sym-swatch-main').style.background=c;
}
function openSymColorPicker(target) {

  const inp=document.getElementById('sym-color-input');
  inp.value=target==='main'?symStrokeColor:(symFillColor==='transparent'?'#ffffff':symFillColor);

}

function toggleGrid() {

  drawGrid(); updateStatus();
}
function toggleSnap() {

  document.getElementById('snap-btn').classList.toggle('active',snapToGrid);

}

// ── POINTER EVENTS ───────────────────────────────────────
function getObjAtPoint(x,y) {
  for (let i=objects.length-1;i>=0;i--) {
    const obj=objects[i], bb=getBoundingBox(obj);
    if (!bb) continue;
    const pad=Math.max(8,(obj.strokeWidth||2)*2);
    if(x>=bb.x-pad&&x<=bb.x+bb.w+pad&&y>=bb.y-pad&&y<=bb.y+bb.h+pad) return obj;
  }
  return null;
}

function makeObj(extra) {
  return {
    id: Date.now()+Math.random(),
    strokeColor, fillColor, strokeWidth, lineDash,
    fontSize, opacity:globalOpacity,
    ...extra
  };
}

overlayCvs.addEventListener('pointerdown', onDown, {passive:false});
overlayCvs.addEventListener('pointermove', onMove, {passive:false});
overlayCvs.addEventListener('pointerup',   onUp,   {passive:false});
overlayCvs.addEventListener('contextmenu', e=>{e.preventDefault();const pos=getCanvasPos(e);handleRightClick(e,pos);});

function onDown(e) {
  if (e.touches && e.touches.length > 1) return; // let pinch handle multi-touch
  e.preventDefault();
  hideCtxMenu();
  commitTextOverlay();

  const pos = getCanvasPos(e);
  const wp  = snapPt(pos);

  if (e.button===2) { handleRightClick(e,pos); return; }

  if (currentTool==='select') {
    const hit=getObjAtPoint(pos.x,pos.y);
    if(hit) {
      selectedObjects=[hit];
      dragObj=hit;
      const bb=getBoundingBox(hit);
      dragOffset={x:pos.x-(bb?bb.x:pos.x), y:pos.y-(bb?bb.y:pos.y)};
      redrawAll();
    } else {
      selectedObjects=[];
      dragObj=null;
      redrawAll();
    }
    return;
  }

  if (currentTool==='eraser') {
    const hit=getObjAtPoint(pos.x,pos.y);
    if(hit){saveUndo();objects=objects.filter(o=>o!==hit);redrawAll();}
    return;
  }

  if (currentTool==='text') { placeTextInput(wp.x,wp.y); return; }

  if (currentTool==='poly') { polyPoints.push({x:wp.x,y:wp.y}); return; }

  if (currentTool==='pen') {
    saveUndo();
    activePenObj=makeObj({type:'pen', points:[{x:wp.x,y:wp.y}]});
    objects.push(activePenObj);
    overlayCvs.setPointerCapture(e.pointerId);
    return;
  }

  isDrawing=true;
  drawStart={x:wp.x,y:wp.y};
  drawCurrent={x:wp.x,y:wp.y};
  overlayCvs.setPointerCapture(e.pointerId);
}

function onMove(e) {
  if (e.touches && e.touches.length > 1) return;
  e.preventDefault();

  const pos=getCanvasPos(e);
  document.getElementById('status-coords').textContent=`X:${Math.round(pos.x)} Y:${Math.round(pos.y)}`;

  if (currentTool==='select'&&dragObj&&(e.buttons===1||(e.touches&&e.touches.length))) {
    const wp=snapPt(pos);
    moveObject(dragObj, wp.x-dragOffset.x, wp.y-dragOffset.y);
    redrawAll();
    return;
  }

  if (currentTool==='pen'&&activePenObj&&(e.buttons===1||(e.touches&&e.touches.length))) {
    const wp=snapPt(pos);
    activePenObj.points.push({x:wp.x,y:wp.y});
    redrawAll();
    return;
  }

  if (currentTool==='poly'&&polyPoints.length>0) {
    const wp=snapPt(pos);
    clearOverlay();
    overlayCtx.save();
    overlayCtx.globalAlpha=globalOpacity;
    overlayCtx.strokeStyle=strokeColor;
    overlayCtx.lineWidth=strokeWidth;
    overlayCtx.lineCap='round'; overlayCtx.lineJoin='round';
    setOverlayDash(overlayCtx);
    overlayCtx.beginPath();
    overlayCtx.moveTo(polyPoints[0].x,polyPoints[0].y);
    for(let i=1;i<polyPoints.length;i++) overlayCtx.lineTo(polyPoints[i].x,polyPoints[i].y);
    overlayCtx.lineTo(wp.x,wp.y);
    overlayCtx.stroke();
    overlayCtx.restore();
    return;
  }

  if(!isDrawing) return;
  const wp=snapPt(pos);
  drawCurrent=wp;
  clearOverlay();
  drawPreview(overlayCtx,drawStart,drawCurrent);
}

function onUp(e) {
  if (currentTool==='pen') { activePenObj=null; return; }
  if (currentTool==='select') { dragObj=null; return; }
  if (!isDrawing) return;
  isDrawing=false;

  const wp=snapPt(drawCurrent);
  clearOverlay();

  const dx=Math.abs(wp.x-drawStart.x), dy=Math.abs(wp.y-drawStart.y);
  if(dx<2&&dy<2) return;

  saveUndo();
  let obj=null;

  switch(currentTool) {
    case 'line':
      obj=makeObj({type:'line',x1:drawStart.x,y1:drawStart.y,x2:wp.x,y2:wp.y}); break;
    case 'arrow':
      obj=makeObj({type:'arrow',x1:drawStart.x,y1:drawStart.y,x2:wp.x,y2:wp.y}); break;
    case 'rect': {
      const x=Math.min(drawStart.x,wp.x), y=Math.min(drawStart.y,wp.y);
      obj=makeObj({type:'rect',x,y,w:Math.abs(wp.x-drawStart.x),h:Math.abs(wp.y-drawStart.y)}); break;
    }
    case 'circle': {
      const cx=(drawStart.x+wp.x)/2, cy=(drawStart.y+wp.y)/2;
      obj=makeObj({type:'circle',cx,cy,rx:Math.abs(wp.x-drawStart.x)/2||4,ry:Math.abs(wp.y-drawStart.y)/2||4}); break;
    }
    case 'measure':
      obj=makeObj({type:'measure',x1:drawStart.x,y1:drawStart.y,x2:wp.x,y2:wp.y,unit:' ft'}); break;
  }

  if(obj){objects.push(obj);redrawAll();}
}

// Double-click finish poly / edit text
overlayCvs.addEventListener('dblclick', e=>{
  if(currentTool==='poly') finishPoly();
});

function finishPoly() {
  if(polyPoints.length<2){polyPoints=[];return;}
  saveUndo();
  objects.push(makeObj({type:'poly',points:[...polyPoints],closed:false}));
  polyPoints=[];
  clearOverlay();
  redrawAll();
}

// ── PREVIEW ──────────────────────────────────────────────
function setOverlayDash(ctx) {
  const sw=strokeWidth;
  if(lineDash==='dashed')      ctx.setLineDash([sw*4,sw*3]);
  else if(lineDash==='dotted') ctx.setLineDash([sw,sw*4]);
  else                         ctx.setLineDash([]);
}

function drawPreview(ctx,start,cur) {
  ctx.save();
  ctx.globalAlpha=globalOpacity;
  ctx.strokeStyle=strokeColor;
  ctx.fillStyle=fillColor;
  ctx.lineWidth=strokeWidth;
  ctx.lineCap='round'; ctx.lineJoin='round';
  setOverlayDash(ctx);

  switch(currentTool) {
    case 'line':
      ctx.beginPath(); ctx.moveTo(start.x,start.y); ctx.lineTo(cur.x,cur.y); ctx.stroke(); break;
    case 'arrow':
      ctx.beginPath(); ctx.moveTo(start.x,start.y); ctx.lineTo(cur.x,cur.y); ctx.stroke();
      ctx.fillStyle=strokeColor;
      drawArrowHead(ctx,start.x,start.y,cur.x,cur.y,strokeWidth*3.5); break;
    case 'rect': {
      const x=Math.min(start.x,cur.x), y=Math.min(start.y,cur.y);
      const w=Math.abs(cur.x-start.x), h=Math.abs(cur.y-start.y);
      if(fillColor&&fillColor!=='transparent') ctx.fillRect(x,y,w,h);
      ctx.strokeRect(x,y,w,h); break;
    }
    case 'circle': {
      const cx=(start.x+cur.x)/2, cy=(start.y+cur.y)/2;
      const rx=Math.abs(cur.x-start.x)/2||2, ry=Math.abs(cur.y-start.y)/2||2;
      ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
      if(fillColor&&fillColor!=='transparent') ctx.fill();
      ctx.stroke(); break;
    }
    case 'measure': {
      ctx.setLineDash([strokeWidth*4,strokeWidth*3]);
      ctx.beginPath(); ctx.moveTo(start.x,start.y); ctx.lineTo(cur.x,cur.y); ctx.stroke();
      ctx.setLineDash([]);
      const ang=Math.atan2(cur.y-start.y,cur.x-start.x)+Math.PI/2, tk=8;
      [[start.x,start.y],[cur.x,cur.y]].forEach(([px,py])=>{
        ctx.beginPath();
        ctx.moveTo(px+Math.cos(ang)*tk,py+Math.sin(ang)*tk);
        ctx.lineTo(px-Math.cos(ang)*tk,py-Math.sin(ang)*tk);
        ctx.stroke();
      });
      const dist=Math.sqrt((cur.x-start.x)**2+(cur.y-start.y)**2).toFixed(1);
      const label=dist+' ft';
      ctx.setLineDash([]);
      ctx.fillStyle=strokeColor;
      ctx.font=`bold 12px 'Share Tech Mono',monospace`;
      const mx=(start.x+cur.x)/2, my=(start.y+cur.y)/2;
      ctx.save(); ctx.translate(mx,my);
      const ta=Math.atan2(cur.y-start.y,cur.x-start.x);
      if(ta>Math.PI/2||ta<-Math.PI/2) ctx.rotate(ta+Math.PI); else ctx.rotate(ta);
      ctx.fillText(label,-ctx.measureText(label).width/2,-6);
      ctx.restore(); break;
    }
  }
  ctx.restore();
}

// ── MOVE OBJECTS ─────────────────────────────────────────
function moveObject(obj,newX,newY) {
  const bb=getBoundingBox(obj);
  if(!bb) return;
  const dx=newX-bb.x, dy=newY-bb.y;
  switch(obj.type) {
    case 'line': case 'arrow': case 'measure':
      obj.x1+=dx; obj.y1+=dy; obj.x2+=dx; obj.y2+=dy; break;
    case 'rect': obj.x+=dx; obj.y+=dy; break;
    case 'circle': obj.cx+=dx; obj.cy+=dy; break;
    case 'pen': case 'poly':
      obj.points=obj.points.map(p=>({x:p.x+dx,y:p.y+dy})); break;
    case 'text': obj.x+=dx; obj.y+=dy; break;
    case 'symbol': obj.x+=dx; obj.y+=dy; break;
  }
}

// ── TEXT INPUT ────────────────────────────────────────────
function placeTextInput(wx,wy) {
  textTA.style.display='block';
  textTA.style.left=wx+'px';
  textTA.style.top=(wy-fontSize)+'px';
  textTA.style.fontSize=fontSize+'px';
  textTA.style.fontFamily="'Share Tech Mono',monospace";
  textTA.style.color=strokeColor;
  textTA.style.background='transparent';
  textTA.value='';
  textTA.focus();
  activeTextObj={wx,wy};
  textTA.oninput=()=>autoResizeTA();
  textTA.onkeydown=e=>{
    if(e.key==='Escape') commitTextOverlay();
    if(e.key==='Enter'&&!e.shiftKey){commitTextOverlay();e.preventDefault();}
  };
}
function autoResizeTA() {
  textTA.style.height='auto';
  textTA.style.height=textTA.scrollHeight+'px';
}
function commitTextOverlay() {
  if(textTA.style.display==='none') return;
  const text=textTA.value.trim();
  if(text&&activeTextObj) {
    saveUndo();
    objects.push(makeObj({type:'text',text,x:activeTextObj.wx,y:activeTextObj.wy,fontSize,fontFamily:"'Share Tech Mono',monospace"}));
    redrawAll();
  }
  textTA.style.display='none';
  textTA.value='';
  activeTextObj=null;
}

// ── UNDO / REDO ───────────────────────────────────────────
function saveUndo() {
  undoStack.push(JSON.stringify(objects));
  if(undoStack.length>80) undoStack.shift();
  redoStack=[];
}
function undo() {
  if(!undoStack.length) return;
  redoStack.push(JSON.stringify(objects));
  objects=JSON.parse(undoStack.pop());
  selectedObjects=[];
  redrawAll(); setStatusMsg('Undo');
}
function redo() {
  if(!redoStack.length) return;
  undoStack.push(JSON.stringify(objects));
  objects=JSON.parse(redoStack.pop());
  selectedObjects=[];
  redrawAll(); setStatusMsg('Redo');
}

// ── CONTEXT MENU ──────────────────────────────────────────
function handleRightClick(e,pos) {
  const hit=getObjAtPoint(pos.x,pos.y);
  if(hit){selectedObjects=[hit];redrawAll();}
  const menu=document.getElementById('ctx-menu');
  menu.style.left=(e.clientX||pos.x)+'px';
  menu.style.top=(e.clientY||pos.y)+'px';
  menu.style.display='block';
}
function hideCtxMenu(){document.getElementById('ctx-menu').style.display='none';}
document.addEventListener('click', hideCtxMenu);

function ctxDelete(){if(!selectedObjects.length)return;saveUndo();objects=objects.filter(o=>!selectedObjects.includes(o));selectedObjects=[];redrawAll();}
function ctxCopy(){if(!selectedObjects.length)return;clipboard=JSON.parse(JSON.stringify(selectedObjects));setStatusMsg('Copied');}
function ctxPaste(){
  if(!clipboard)return;saveUndo();
  clipboard.forEach(obj=>{
    const n=JSON.parse(JSON.stringify(obj));
    n.id=Date.now()+Math.random();
    moveObject(n,(getBoundingBox(n)||{x:0}).x+20,(getBoundingBox(n)||{y:0}).y+20);
    objects.push(n);
  });
  redrawAll(); setStatusMsg('Pasted');
}
function ctxDuplicate(){ctxCopy();ctxPaste();}
function ctxBringFront(){if(!selectedObjects.length)return;saveUndo();selectedObjects.forEach(o=>{objects=objects.filter(x=>x!==o);objects.push(o);});redrawAll();}
function ctxSendBack(){if(!selectedObjects.length)return;saveUndo();selectedObjects.forEach(o=>{objects=objects.filter(x=>x!==o);objects.unshift(o);});redrawAll();}

// ── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();redo();}
  if((e.ctrlKey||e.metaKey)&&e.key==='c') ctxCopy();
  if((e.ctrlKey||e.metaKey)&&e.key==='v') ctxPaste();
  if(e.key==='Delete'||e.key==='Backspace') ctxDelete();
  if(e.key==='Escape'){if(currentTool==='poly'&&polyPoints.length>1)finishPoly();commitTextOverlay();selectedObjects=[];clearOverlay();redrawAll();}
  if(e.key==='+') adjustZoom(0.15);
  if(e.key==='-') adjustZoom(-0.15);
  const map={v:'select',p:'pen',l:'line',a:'arrow',r:'rect',c:'circle',m:'measure',t:'text',e:'eraser',o:'poly'};
  if(!e.ctrlKey&&!e.metaKey&&map[e.key.toLowerCase()]) setTool(map[e.key.toLowerCase()]);
});

// ── CLEAR ─────────────────────────────────────────────────
function confirmClear(){
  if(!objects.length||confirm('Clear the canvas? This cannot be undone.')){
    saveUndo(); objects=[]; selectedObjects=[]; polyPoints=[];
    commitTextOverlay(); clearOverlay(); redrawAll(); setStatusMsg('Canvas cleared');
  }
}

// ── EXPORT / PRINT ────────────────────────────────────────
function exportPNG() {
  const exp=document.createElement('canvas');
  exp.width=PAGE_W; exp.height=PAGE_H;
  const ectx=exp.getContext('2d');
  ectx.fillStyle=darkMode?'#0d1b2a':'#ffffff';
  ectx.fillRect(0,0,PAGE_W,PAGE_H);
  if(showGrid) ectx.drawImage(gridCvs,0,0);
  ectx.drawImage(mainCvs,0,0);
  const link=document.createElement('a');
  link.download='AOG_Drawing_'+Date.now()+'.png';
  link.href=exp.toDataURL('image/png');
  link.click();
  setStatusMsg('PNG exported ✓');
}

function printPage() {
  // Temporarily hide selection indicators
  const prevSel=[...selectedObjects];
  selectedObjects=[];
  mainCtx.clearRect(0,0,PAGE_W,PAGE_H);
  objects.forEach(obj=>drawObject(mainCtx,obj,false));

  // Add title block watermark to a temp canvas, draw to main
  const tmp=document.createElement('canvas');
  tmp.width=PAGE_W; tmp.height=PAGE_H;
  const tc=tmp.getContext('2d');
  tc.drawImage(mainCvs,0,0);
  // Title block
  tc.strokeStyle='#D97706'; tc.lineWidth=2;
  tc.strokeRect(8,8,PAGE_W-16,PAGE_H-16);
  tc.strokeRect(8,PAGE_H-52,PAGE_W-16,44);
  tc.fillStyle='rgba(217,119,6,0.06)';
  tc.fillRect(8,PAGE_H-52,PAGE_W-16,44);
  tc.fillStyle='#1F2937';
  tc.font="bold 12px 'Orbitron',monospace";
  tc.fillText('ALWAYS ON GENERATORS', 16, PAGE_H-32);
  tc.font="10px 'Share Tech Mono',monospace";
  tc.fillText('Site Drawing — '+new Date().toLocaleDateString(), 16, PAGE_H-16);
  tc.fillText('Scale: As Noted', PAGE_W-150, PAGE_H-32);
  tc.fillText('8.5 × 11 in', PAGE_W-150, PAGE_H-16);

  // Put the temp image into main canvas
  mainCtx.clearRect(0,0,PAGE_W,PAGE_H);
  mainCtx.drawImage(tmp,0,0);

  window.print();

  // Restore
  setTimeout(()=>{
    selectedObjects=prevSel;
    redrawAll();
  },1000);
  setStatusMsg('Print dialog opened ✓');
}

];

// ── BUILD SYMBOL PANEL ────────────────────────────────────
function buildSymPanel() {
  const scroll=document.getElementById('sym-scroll');
  const cats={};
  SYMBOLS.forEach(s=>{ if(!cats[s.cat]) cats[s.cat]=[]; cats[s.cat].push(s); });
  scroll.innerHTML='';
  Object.entries(cats).forEach(([cat,syms])=>{
    const div=document.createElement('div');
    div.className='sym-category'; div.textContent=cat;
    scroll.appendChild(div);
    const grid=document.createElement('div');
    grid.className='sym-grid';
    syms.forEach(sym=>{
      const btn=document.createElement('button');
      btn.className='sym-btn';
      btn.dataset.name=sym.name.toLowerCase();

      // Draw preview canvas
      const cvs=document.createElement('canvas');
      cvs.width=cvs.height=44;
      const ctx=cvs.getContext('2d');
      ctx.strokeStyle='#1F2937';
      ctx.fillStyle='transparent';
      ctx.lineWidth=1.8;
      ctx.lineCap='round'; ctx.lineJoin='round';
      const fn=getSymFn(sym.key);
      if(fn) fn(ctx,44,44,'#1F2937','transparent');
      btn.appendChild(cvs);

      const lbl=document.createElement('span');
      lbl.textContent=sym.name;
      btn.appendChild(lbl);
      btn.addEventListener('click',()=>placeSymbol(sym));
      grid.appendChild(btn);
    });
    scroll.appendChild(grid);
  });
}

function filterSymbols(q) {
  const lower=q.toLowerCase();
  document.querySelectorAll('.sym-btn').forEach(b=>{
    b.style.display=b.dataset.name.includes(lower)?'':'none';
  });
}

function toggleSymPanel() {
  const panel=document.getElementById('sym-panel');
  panel.classList.toggle('open');
  document.getElementById('tool-elec').classList.toggle('active', panel.classList.contains('open'));
}

function placeSymbol(sym) {
  const cx=PAGE_W/2;
  const cy=PAGE_H/2;
  const sz=symSize||80;
  saveUndo();
  const obj={
    id:Date.now()+Math.random(),
    type:'symbol',
    symKey:sym.key,
    symName:sym.name,
    symColor:symStrokeColor,
    symFill:symFillColor,
    x:cx-sz/2, y:cy-sz/2,
    w:sz, h:sz,
    strokeWidth:1.8,
    opacity:globalOpacity
  };
  objects.push(obj);
  selectedObjects=[obj];
  redrawAll();
  setStatusMsg(sym.name+' placed — drag to move, corner handle to resize');
}

// ── INIT ─────────────────────────────────────────────────
(function init() {
  const saved=localStorage.getItem(THEME_KEY);
  const preferDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;
  applyTheme(saved?saved==='dark':preferDark);

  document.getElementById('grid-btn').classList.toggle('active',showGrid);

  buildSymPanel();
  drawGrid();
  redrawAll();

  if(darkMode) { setStrokeColor('#E0F7FF'); setSymColor('#E0F7FF'); }

  // Fit page on load after a short delay
  setTimeout(fitPage, 100);

  setStatusMsg('8.5×11 page ready — V=select P=pen L=line A=arrow R=rect T=text M=measure', 5000);
  updateStatus();
})();
</script>
